<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AR Go — Phase 1: Board Tracking</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
  #status {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 10px 14px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.4;
  }
  #status.found { background: rgba(0,120,0,0.75); }
  #log {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(0,0,0,0.75);
    color: #0f8;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 12px;
    max-height: 30vh;
    overflow-y: auto;
    white-space: pre-wrap;
  }
</style>
</head>
<body style="margin:0; overflow:hidden;">

<div id="status">Point your camera at the printed marker. See instructions below the page — nothing will render until the marker is detected.</div>
<div id="log">Waiting for marker...</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true"
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
>
  <a-marker preset="hiro" id="marker" size="0.146" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
    <a-entity id="board-root"></a-entity>
  </a-marker>

  <a-entity camera id="main-camera"></a-entity>
</a-scene>

<div id="controls" style="position:fixed; bottom:32vh; left:0; right:0; z-index:50; display:flex; justify-content:center; gap:10px; font-family:-apple-system, system-ui, sans-serif;">
  <button id="smaller" style="font-size:20px; padding:10px 18px;">− Smaller</button>
  <span id="spacing-label" style="background:rgba(0,0,0,0.75); color:white; padding:10px 14px; border-radius:6px;">2.3cm</span>
  <button id="bigger" style="font-size:20px; padding:10px 18px;">+ Bigger</button>
</div>

<script>
  const GRID_SIZE = 19;
  let SPACING = 0.023; // meters, adjustable live via the buttons below
  const boardRoot = document.getElementById('board-root');
  const marker = document.getElementById('marker');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const spacingLabel = document.getElementById('spacing-label');

  let stoneCount = 0;

  function log(msg) {
    logEl.textContent = msg + '\n' + logEl.textContent;
  }

  marker.addEventListener('markerFound', () => {
    statusEl.textContent = 'Marker detected — grid should be locked to it. Use the +/- buttons to resize, tap a dot to test placement.';
    statusEl.classList.add('found');
  });
  marker.addEventListener('markerLost', () => {
    statusEl.textContent = 'Marker lost — point your camera back at it.';
    statusEl.classList.remove('found');
  });

  function buildGrid() {
    // Clear existing grid/stones and rebuild at the current SPACING
    while (boardRoot.firstChild) boardRoot.removeChild(boardRoot.firstChild);
    stoneCount = 0;

    const totalSize = SPACING * (GRID_SIZE - 1);

    for (let i = 0; i < GRID_SIZE; i++) {
      const offset = i * SPACING;
      addLine(0, offset, totalSize, offset);
      addLine(offset, 0, offset, totalSize);
    }

    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const dot = document.createElement('a-sphere');
        dot.setAttribute('radius', (SPACING * 0.25).toFixed(4));
        dot.setAttribute('color', '#ffcc00');
        dot.setAttribute('opacity', '0.7');
        dot.setAttribute('position', `${col * SPACING} 0.002 ${row * SPACING}`);
        dot.classList.add('intersection');
        dot.dataset.row = row;
        dot.dataset.col = col;
        boardRoot.appendChild(dot);
      }
    }

    spacingLabel.textContent = (SPACING * 100).toFixed(1) + 'cm';
  }

  function addLine(x1, z1, x2, z2) {
    const line = document.createElement('a-entity');
    line.setAttribute('line', {
      start: `${x1} 0.001 ${z1}`,
      end: `${x2} 0.001 ${z2}`,
      color: '#222'
    });
    boardRoot.appendChild(line);
  }

  document.getElementById('bigger').addEventListener('click', () => {
    SPACING *= 1.1;
    buildGrid();
  });
  document.getElementById('smaller').addEventListener('click', () => {
    SPACING *= 0.9;
    buildGrid();
  });

  function placeStoneAt(row, col) {
    stoneCount++;
    const stone = document.createElement('a-cylinder');
    stone.setAttribute('radius', (SPACING * 0.4).toFixed(4));
    stone.setAttribute('height', '0.004');
    stone.setAttribute('color', stoneCount % 2 === 0 ? '#ffffff' : '#111111');
    stone.setAttribute('position', `${col * SPACING} 0.006 ${row * SPACING}`);
    boardRoot.appendChild(stone);
    log(`Stone #${stoneCount} placed at row=${row}, col=${col}`);
  }

  // Manual raycasting for tap detection — more reliable across devices than A-Frame's built-in cursor component
  function onTap(event) {
    const sceneEl = document.querySelector('a-scene');
    if (!sceneEl || !sceneEl.camera) {
      log('Tap ignored: camera not ready yet');
      return;
    }

    const touch = event.changedTouches ? event.changedTouches[0] : event;
    const x = (touch.clientX / window.innerWidth) * 2 - 1;
    const y = -(touch.clientY / window.innerHeight) * 2 + 1;

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera({ x, y }, sceneEl.camera);

    const dots = Array.from(document.querySelectorAll('.intersection'))
      .map((el) => el.object3D)
      .filter(Boolean);

    const intersects = raycaster.intersectObjects(dots, true);

    if (intersects.length > 0) {
      let obj = intersects[0].object;
      while (obj && !obj.el) obj = obj.parent;
      if (obj && obj.el) {
        const row = parseInt(obj.el.dataset.row, 10);
        const col = parseInt(obj.el.dataset.col, 10);
        placeStoneAt(row, col);
        return;
      }
    }
    log(`Tap missed — no intersection dot under (${touch.clientX}, ${touch.clientY})`);
  }

  window.addEventListener('touchend', onTap);
  window.addEventListener('click', onTap);

  buildGrid();
  window.addEventListener('error', (e) => log('ERROR: ' + e.message));
</script>

</body>
</html>
