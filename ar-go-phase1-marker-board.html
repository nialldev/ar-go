<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AR Go — Phase 1: Board Tracking</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
  #status {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 10px 14px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.4;
  }
  #status.found { background: rgba(0,120,0,0.75); }
  #log {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(0,0,0,0.75);
    color: #0f8;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 12px;
    max-height: 30vh;
    overflow-y: auto;
    white-space: pre-wrap;
  }
</style>
</head>
<body style="margin:0; overflow:hidden;">

<div id="status">Point your camera at the printed marker. See instructions below the page — nothing will render until the marker is detected.</div>
<div id="log">Waiting for marker...</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true"
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
>
  <a-marker preset="hiro" id="marker" size="0.146" smooth="true" smoothCount="20" smoothTolerance="0.005" smoothThreshold="10">
    <a-entity id="board-root"></a-entity>
  </a-marker>

  <a-entity camera id="main-camera"></a-entity>
</a-scene>

<div id="controls" style="position:fixed; bottom:32vh; left:0; right:0; z-index:50; display:flex; flex-direction:column; align-items:center; gap:8px; font-family:-apple-system, system-ui, sans-serif;">
  <div style="display:flex; gap:10px;">
    <button id="smaller" style="font-size:18px; padding:8px 14px;">− Scale</button>
    <span id="spacing-label" style="background:rgba(0,0,0,0.75); color:white; padding:8px 12px; border-radius:6px;">2.1 x 2.2cm</span>
    <button id="bigger" style="font-size:18px; padding:8px 14px;">+ Scale</button>
  </div>
  <div style="display:flex; gap:6px; align-items:center;">
    <button id="left" style="font-size:18px; padding:8px 12px;">←</button>
    <button id="up" style="font-size:18px; padding:8px 12px;">↑</button>
    <button id="down" style="font-size:18px; padding:8px 12px;">↓</button>
    <button id="right" style="font-size:18px; padding:8px 12px;">→</button>
    <button id="rot-left" style="font-size:18px; padding:8px 12px;">⟲</button>
    <button id="rot-right" style="font-size:18px; padding:8px 12px;">⟳</button>
  </div>
  <span id="offset-label" style="background:rgba(0,0,0,0.75); color:white; padding:6px 10px; border-radius:6px; font-size:11px;">offset: 0, 0 | rot: 0°</span>
</div>

<script>
  const GRID_SIZE = 19;
  const BASE_SPACING_X = 0.021; // measured: 2.1cm width between intersections
  const BASE_SPACING_Z = 0.022; // measured: 2.2cm height between intersections
  let scaleFactor = 1.0;        // fine-tune multiplier via the Scale buttons, starts accurate at 1.0
  let OFFSET_X = -0.073;
  let OFFSET_Z = -0.073;
  let ROTATION = 0;
  const boardRoot = document.getElementById('board-root');
  const marker = document.getElementById('marker');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const spacingLabel = document.getElementById('spacing-label');
  const offsetLabel = document.getElementById('offset-label');

  let stoneCount = 0;

  function log(msg) {
    logEl.textContent = msg + '\n' + logEl.textContent;
  }

  marker.addEventListener('markerFound', () => {
    statusEl.textContent = 'Marker detected. Use Scale to resize, arrows to nudge the grid onto the corner, rotate to align.';
    statusEl.classList.add('found');
  });
  marker.addEventListener('markerLost', () => {
    statusEl.textContent = 'Marker lost — point your camera back at it.';
    statusEl.classList.remove('found');
  });

  function updateTransform() {
    boardRoot.setAttribute('position', `${OFFSET_X} 0 ${OFFSET_Z}`);
    boardRoot.setAttribute('rotation', `0 ${ROTATION} 0`);
    offsetLabel.textContent = `offset: ${(OFFSET_X*100).toFixed(1)}, ${(OFFSET_Z*100).toFixed(1)}cm | rot: ${ROTATION}°`;
  }

  function buildGrid() {
    while (boardRoot.firstChild) boardRoot.removeChild(boardRoot.firstChild);
    stoneCount = 0;

    const spacingX = BASE_SPACING_X * scaleFactor;
    const spacingZ = BASE_SPACING_Z * scaleFactor;
    const totalX = spacingX * (GRID_SIZE - 1);
    const totalZ = spacingZ * (GRID_SIZE - 1);

    for (let i = 0; i < GRID_SIZE; i++) {
      const rowZ = i * spacingZ;
      const colX = i * spacingX;
      addLine(0, rowZ, totalX, rowZ);   // horizontal line
      addLine(colX, 0, colX, totalZ);   // vertical line
    }

    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const dot = document.createElement('a-sphere');
        dot.setAttribute('radius', (Math.min(spacingX, spacingZ) * 0.25).toFixed(4));
        dot.setAttribute('color', '#ffcc00');
        dot.setAttribute('opacity', '0.7');
        dot.setAttribute('position', `${col * spacingX} 0.002 ${row * spacingZ}`);
        dot.classList.add('intersection');
        dot.dataset.row = row;
        dot.dataset.col = col;
        boardRoot.appendChild(dot);
      }
    }

    spacingLabel.textContent = (spacingX*100).toFixed(2) + ' x ' + (spacingZ*100).toFixed(2) + 'cm';
  }

  function addLine(x1, z1, x2, z2) {
    const line = document.createElement('a-entity');
    line.setAttribute('line', {
      start: `${x1} 0.001 ${z1}`,
      end: `${x2} 0.001 ${z2}`,
      color: '#222'
    });
    boardRoot.appendChild(line);
  }

  document.getElementById('bigger').addEventListener('click', () => { scaleFactor += 0.02; buildGrid(); });
  document.getElementById('smaller').addEventListener('click', () => { scaleFactor = Math.max(0.5, scaleFactor - 0.02); buildGrid(); });

  const NUDGE = 0.01; // 1cm per tap
  document.getElementById('left').addEventListener('click', () => { OFFSET_X -= NUDGE; updateTransform(); });
  document.getElementById('right').addEventListener('click', () => { OFFSET_X += NUDGE; updateTransform(); });
  document.getElementById('up').addEventListener('click', () => { OFFSET_Z -= NUDGE; updateTransform(); });
  document.getElementById('down').addEventListener('click', () => { OFFSET_Z += NUDGE; updateTransform(); });
  document.getElementById('rot-left').addEventListener('click', () => { ROTATION -= 2; updateTransform(); });
  document.getElementById('rot-right').addEventListener('click', () => { ROTATION += 2; updateTransform(); });

  function placeStoneAt(row, col) {
    stoneCount++;
    const spacingX = BASE_SPACING_X * scaleFactor;
    const spacingZ = BASE_SPACING_Z * scaleFactor;
    const stone = document.createElement('a-cylinder');
    stone.setAttribute('radius', (Math.min(spacingX, spacingZ) * 0.4).toFixed(4));
    stone.setAttribute('height', '0.004');
    stone.setAttribute('color', stoneCount % 2 === 0 ? '#ffffff' : '#111111');
    stone.setAttribute('position', `${col * spacingX} 0.006 ${row * spacingZ}`);
    boardRoot.appendChild(stone);
    log(`Stone #${stoneCount} placed at row=${row}, col=${col}`);
  }

  function onTap(event) {
    const sceneEl = document.querySelector('a-scene');
    if (!sceneEl || !sceneEl.camera) {
      log('Tap ignored: camera not ready yet');
      return;
    }

    const touch = event.changedTouches ? event.changedTouches[0] : event;
    const tapX = touch.clientX;
    const tapY = touch.clientY;

    const camera = sceneEl.camera;
    const dotEls = Array.from(document.querySelectorAll('.intersection'));

    let closest = null;
    let closestDist = Infinity;
    const worldPos = new THREE.Vector3();

    dotEls.forEach((el) => {
      if (!el.object3D) return;
      el.object3D.getWorldPosition(worldPos);

      // Skip points behind the camera
      const projected = worldPos.clone().project(camera);
      if (projected.z > 1) return;

      const screenX = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const screenY = (-projected.y * 0.5 + 0.5) * window.innerHeight;

      const dist = Math.hypot(screenX - tapX, screenY - tapY);
      if (dist < closestDist) {
        closestDist = dist;
        closest = el;
      }
    });

    const TAP_RADIUS_PX = 60; // how forgiving the tap needs to be, in screen pixels

    if (closest && closestDist < TAP_RADIUS_PX) {
      const row = parseInt(closest.dataset.row, 10);
      const col = parseInt(closest.dataset.col, 10);
      placeStoneAt(row, col);
    } else {
      log(`Tap missed — nearest dot was ${closestDist.toFixed(0)}px away`);
    }
  }

  window.addEventListener('touchend', onTap);
  window.addEventListener('click', onTap);

  buildGrid();
  updateTransform();
  window.addEventListener('error', (e) => log('ERROR: ' + e.message));
</script>

</body>
</html>
