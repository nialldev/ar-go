<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AR Go — WebXR Corner Calibration</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: -apple-system, system-ui, sans-serif; }
  #status {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(0,0,0,0.75); color: white; padding: 10px 14px; font-size: 13px; line-height: 1.4;
  }
  #status.ready { background: rgba(0,120,0,0.75); }
  #log {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: rgba(0,0,0,0.75); color: #0f8; padding: 10px 14px;
    font-family: monospace; font-size: 12px; max-height: 24vh; overflow-y: auto; white-space: pre-wrap;
  }
  #not-supported {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center;
    color: white; background: #111; text-align: center; padding: 24px; box-sizing: border-box; font-size: 16px; line-height: 1.5;
  }
  button.control {
    position: fixed; z-index: 60; font-size: 13px; padding: 8px 12px;
  }
  .adjust-btn {
    font-size: 13px; padding: 8px 12px; z-index: 61;
  }
</style>
</head>
<body>

<div id="status">Tap "Start AR", then tap your board's 4 corners in order: top-left, top-right, bottom-left, bottom-right.</div>
<div id="log">Waiting to start...</div>
<div id="not-supported" style="display:none;"></div>
<button id="recalibrate" class="control" style="top:54px; right:10px;">Recalibrate</button>
<button id="pass-btn" class="control" style="top:54px; left:10px;">Pass</button>
<button id="resign-btn" class="control" style="top:96px; left:10px;">Resign</button>
<button id="clear-stones-btn" class="control" style="top:96px; right:10px;">Clear Stones</button>
<button id="undo-btn" class="control" style="top:138px; right:10px;">Undo</button>
<button id="finalize-btn" class="control" style="display:none; top:222px; right:10px; background:#0a0; color:white;">Finalize Score</button>
<div id="captures" style="position:fixed; top:180px; left:0; right:0; z-index:55; text-align:center; color:white; font-family:-apple-system, system-ui, sans-serif; font-size:13px; background:rgba(0,0,0,0.6); padding:4px;">Captures — Black: 0 &nbsp; White: 0</div>

<div id="adjust-ui" style="display:none; position:fixed; top:110px; left:0; right:0; z-index:60; background:rgba(0,0,0,0.9); padding:10px; font-family:-apple-system, system-ui, sans-serif;">
  <div style="display:flex; gap:6px; justify-content:center; margin-bottom:8px;">
    <button class="corner-select adjust-btn" data-corner="0">TL</button>
    <button class="corner-select adjust-btn" data-corner="1">TR</button>
    <button class="corner-select adjust-btn" data-corner="2">BL</button>
    <button class="corner-select adjust-btn" data-corner="3">BR</button>
  </div>
  <div style="display:flex; gap:6px; justify-content:center; margin-bottom:8px;">
    <button id="adj-left" class="adjust-btn">←</button>
    <button id="adj-up" class="adjust-btn">↑</button>
    <button id="adj-down" class="adjust-btn">↓</button>
    <button id="adj-right" class="adjust-btn">→</button>
  </div>
  <div style="display:flex; justify-content:center;">
    <button id="adj-confirm" class="adjust-btn" style="background:#0a0; color:white;">Confirm & Build Grid</button>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

const GRID_SIZE = 19;
let camera, scene, renderer;
let reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;

const cornerNames = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
let corners = []; // THREE.Vector3[]
let calibrated = false;
let adjusting = false;
let selectedCorner = 0;
const HEIGHT_OFFSET = 0.01; // flipped sign — previous value moved things the wrong way
const NUDGE_STEP = 0.003; // 3mm per arrow press

const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(msg) {
  logEl.textContent = msg + '\n' + logEl.textContent;
}

window.addEventListener('error', (e) => log('ERROR: ' + e.message));

try {
  init();
} catch (err) {
  log('init() failed: ' + err.message);
}

function init() {
  const container = document.createElement('div');
  document.body.appendChild(container);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
  light.position.set(0.5, 1, 0.25);
  scene.add(light);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  container.appendChild(renderer.domElement);

  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
      if (!supported) {
        showNotSupported("WebXR AR isn't supported on this device/browser. Try the latest Chrome on Android.");
      } else {
        document.body.appendChild(ARButton.createButton(renderer, {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.body }
        }));
      }
    }).catch((err) => showNotSupported('isSessionSupported check failed: ' + err.message));
  } else {
    showNotSupported("WebXR isn't available in this browser.");
  }

  // Reticle: hollow ring + crosshair for clearer aiming than a solid-looking blob
  reticle = new THREE.Group();
  const ringGeo = new THREE.RingGeometry(0.045, 0.05, 32).rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide });
  reticle.add(new THREE.Mesh(ringGeo, ringMat));

  const crossMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
  const barGeo = new THREE.BoxGeometry(0.09, 0.002, 0.002);
  const crossH = new THREE.Mesh(barGeo, crossMat);
  reticle.add(crossH);
  const crossV = new THREE.Mesh(barGeo, crossMat);
  crossV.rotation.y = Math.PI / 2;
  reticle.add(crossV);

  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  const controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  window.addEventListener('resize', onWindowResize);
  renderer.domElement.addEventListener('webglcontextlost', (e) => {
    e.preventDefault();
    log('!!! WEBGL CONTEXT LOST !!! This is likely why the screen went black — a GPU-level crash, not a JS error. Try reloading the page.');
  });
  renderer.domElement.addEventListener('webglcontextrestored', () => {
    log('WebGL context restored');
  });

  renderer.setAnimationLoop(render);
}

function showNotSupported(message) {
  statusEl.style.display = 'none';
  const el = document.getElementById('not-supported');
  el.style.display = 'flex';
  el.textContent = message;
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- Corner calibration via hit-test taps ---
const cornerMarkers = []; // THREE.Mesh[] — one per tapped corner, kept so we can move them during adjustment

function createXMarker(color) {
  const group = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color });
  const barGeo = new THREE.BoxGeometry(0.018, 0.001, 0.003);
  const bar1 = new THREE.Mesh(barGeo, mat);
  bar1.rotation.y = Math.PI / 4;
  group.add(bar1);
  const bar2 = new THREE.Mesh(barGeo, mat);
  bar2.rotation.y = -Math.PI / 4;
  group.add(bar2);
  return group;
}

function createRingCrosshairMarker(color) {
  const group = new THREE.Group();
  const ringGeo = new THREE.RingGeometry(0.02, 0.024, 32).rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
  group.add(new THREE.Mesh(ringGeo, ringMat));

  const crossMat = new THREE.MeshBasicMaterial({ color });
  const barGeo = new THREE.BoxGeometry(0.04, 0.002, 0.002);
  const crossH = new THREE.Mesh(barGeo, crossMat);
  group.add(crossH);
  const crossV = new THREE.Mesh(barGeo, crossMat);
  crossV.rotation.y = Math.PI / 2;
  group.add(crossV);

  return group;
}

function onSelect() {
  if (adjusting) return; // fine-tuning is handled entirely by the DOM buttons now

  if (!reticle.visible) {
    log('Tap ignored: no surface detected right now (reticle not visible)');
    return;
  }

  if (!calibrated) {
    const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
    corners.push(pos.clone());
    log(`Corner ${corners.length} (${cornerNames[corners.length - 1]}) placed at x=${pos.x.toFixed(3)}, y=${pos.y.toFixed(3)}, z=${pos.z.toFixed(3)}`);

    const marker = createRingCrosshairMarker(0x00ff88);
    marker.position.copy(pos);
    scene.add(marker);
    cornerMarkers.push(marker);

    if (corners.length < 4) {
      statusEl.textContent = `Corner ${corners.length}/4 placed. Now tap the board's ${cornerNames[corners.length]} corner.`;
    } else {
      log('4th corner placed — switching to fine-tune mode');
      adjusting = true;
      selectedCorner = 0;
      reticle.visible = false;
      showAdjustUI();
      updateAdjustStatus();
      log('showAdjustUI() called — adjust-ui display is now: ' + document.getElementById('adjust-ui').style.display);
    }
    return;
  }
}

function updateAdjustStatus() {
  statusEl.textContent = `Fine-tune corners: adjusting ${cornerNames[selectedCorner]}. Use arrows to nudge it onto the real corner, then tap another corner button or Confirm.`;
}

function finalizeCalibration() {
  try {
    adjusting = false;
    calibrated = true;
    hideAdjustUI();
    cornerMarkers.forEach((m) => scene.remove(m));
    statusEl.classList.add('ready');
    buildGrid();
    resetBoardState();
    updateTurnStatus();
  } catch (err) {
    log('ERROR in finalizeCalibration/buildGrid: ' + err.message);
    console.error(err);
  }
}

function resetCalibration() {
  corners = [];
  calibrated = false;
  adjusting = false;
  cornerMarkers.forEach((m) => scene.remove(m));
  cornerMarkers.length = 0;
  hideAdjustUI();
  clearGrid();
  reticle.visible = false;
  statusEl.classList.remove('ready');
  statusEl.textContent = 'Recalibrating — tap the board\'s top-left corner.';
  log('Recalibration started');
}

document.getElementById('recalibrate').addEventListener('click', resetCalibration);

function showAdjustUI() {
  document.getElementById('adjust-ui').style.display = 'block';
  highlightSelectedCorner();
}
function hideAdjustUI() {
  document.getElementById('adjust-ui').style.display = 'none';
}
function highlightSelectedCorner() {
  document.querySelectorAll('.corner-select').forEach((btn) => {
    btn.style.background = (parseInt(btn.dataset.corner) === selectedCorner) ? '#0a0' : '';
    btn.style.color = (parseInt(btn.dataset.corner) === selectedCorner) ? 'white' : '';
  });
}

document.querySelectorAll('.corner-select').forEach((btn) => {
  btn.addEventListener('click', () => {
    log(`Corner-select button clicked: ${btn.textContent} (index ${btn.dataset.corner})`);
    selectedCorner = parseInt(btn.dataset.corner);
    highlightSelectedCorner();
    updateAdjustStatus();
  });
});

// Nudge the selected corner along world X/Z (approximates the board's horizontal plane)
document.getElementById('adj-left').addEventListener('click', () => { corners[selectedCorner].x -= NUDGE_STEP; cornerMarkers[selectedCorner].position.copy(corners[selectedCorner]); });
document.getElementById('adj-right').addEventListener('click', () => { corners[selectedCorner].x += NUDGE_STEP; cornerMarkers[selectedCorner].position.copy(corners[selectedCorner]); });
document.getElementById('adj-up').addEventListener('click', () => { corners[selectedCorner].z -= NUDGE_STEP; cornerMarkers[selectedCorner].position.copy(corners[selectedCorner]); });
document.getElementById('adj-down').addEventListener('click', () => { corners[selectedCorner].z += NUDGE_STEP; cornerMarkers[selectedCorner].position.copy(corners[selectedCorner]); });

document.getElementById('adj-confirm').addEventListener('click', finalizeCalibration);

// --- Grid construction (reusing the same bilinear approach, now from 4 fixed real-world taps) ---
const dotMeshes = [];
let lineMeshes = [];
const stoneAssets = {};
let stoneCount = 0;
let gridBuilt = false;

function gridPosition(row, col, target) {
  const u = col / (GRID_SIZE - 1);
  const v = row / (GRID_SIZE - 1);
  const tl = corners[0], tr = corners[1], bl = corners[2], br = corners[3];

  target.x = tl.x * (1 - u) * (1 - v) + tr.x * u * (1 - v) + bl.x * (1 - u) * v + br.x * u * v;
  target.y = tl.y * (1 - u) * (1 - v) + tr.y * u * (1 - v) + bl.y * (1 - u) * v + br.y * u * v;
  target.z = tl.z * (1 - u) * (1 - v) + tr.z * u * (1 - v) + bl.z * (1 - u) * v + br.z * u * v;
  target.y += HEIGHT_OFFSET; // nudge down closer to the real board surface
  return target;
}

const LINE_THICKNESS = 0.003;
function positionLineMesh(mesh, a, b) {
  const mid = a.clone().add(b).multiplyScalar(0.5);
  const dir = b.clone().sub(a);
  const length = Math.max(dir.length(), 0.0001);
  mesh.position.copy(mid);
  mesh.scale.set(length, LINE_THICKNESS, LINE_THICKNESS);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), dir.normalize());
}

function clearGrid() {
  dotMeshes.forEach((m) => scene.remove(m));
  dotMeshes.length = 0;
  lineMeshes.forEach((m) => scene.remove(m));
  lineMeshes.length = 0;
  placedStones.forEach((s) => { scene.remove(s.stoneMesh); scene.remove(s.ringMesh); });
  placedStones.length = 0;
  stoneCount = 0;
  gridBuilt = false;
  resetBoardState();
}

function buildGrid() {
  const dotGeo = new THREE.SphereGeometry(0.005, 8, 8);
  const dotMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.85 });

  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      const mesh = new THREE.Mesh(dotGeo, dotMat);
      mesh.userData.row = row;
      mesh.userData.col = col;
      gridPosition(row, col, mesh.position);
      scene.add(mesh);
      dotMeshes.push(mesh);
    }
  }

  const lineBoxGeo = new THREE.BoxGeometry(1, 1, 1);
  const lineBoxMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
  const a = new THREE.Vector3(), b = new THREE.Vector3();

  for (let row = 0; row < GRID_SIZE; row++) {
    const mesh = new THREE.Mesh(lineBoxGeo, lineBoxMat);
    gridPosition(row, 0, a);
    gridPosition(row, GRID_SIZE - 1, b);
    positionLineMesh(mesh, a, b);
    scene.add(mesh);
    lineMeshes.push(mesh);
  }
  for (let col = 0; col < GRID_SIZE; col++) {
    const mesh = new THREE.Mesh(lineBoxGeo, lineBoxMat);
    gridPosition(0, col, a);
    gridPosition(GRID_SIZE - 1, col, b);
    positionLineMesh(mesh, a, b);
    scene.add(mesh);
    lineMeshes.push(mesh);
  }

  stoneAssets.blackMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  stoneAssets.whiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  stoneAssets.stoneGeo = new THREE.CylinderGeometry(0.011, 0.011, 0.006, 24);
  stoneAssets.ringGeo = new THREE.RingGeometry(0.0115, 0.0145, 24).rotateX(-Math.PI / 2);
  stoneAssets.ringMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, side: THREE.DoubleSide });

  gridBuilt = true;
  reticle.visible = false;
}

// --- Go rules engine ---
const EMPTY = 0, BLACK = 1, WHITE = 2;
let boardState = [];
for (let r = 0; r < GRID_SIZE; r++) boardState.push(new Array(GRID_SIZE).fill(EMPTY));
let currentTurn = BLACK;
let koPoint = null;
let passCount = 0;
let gameOver = false;
let blackCaptures = 0; // stones Black has captured (i.e. White stones removed)
let whiteCaptures = 0; // stones White has captured
let markingDeadStones = false;
const deadMarkers = new Map(); // 'row,col' -> X marker mesh (Group)

function resetBoardState() {
  boardState = [];
  for (let r = 0; r < GRID_SIZE; r++) boardState.push(new Array(GRID_SIZE).fill(EMPTY));
  currentTurn = BLACK;
  koPoint = null;
  passCount = 0;
  gameOver = false;
  blackCaptures = 0;
  whiteCaptures = 0;
  updateCapturesUI();
  markingDeadStones = false;
  deadMarkers.forEach((xMesh) => scene.remove(xMesh));
  deadMarkers.clear();
  document.getElementById('finalize-btn').style.display = 'none';
}

function updateCapturesUI() {
  document.getElementById('captures').textContent = `Captures — Black: ${blackCaptures}   White: ${whiteCaptures}`;
}

// --- Move history (full-state snapshots) for reliable Undo ---
const moveHistory = [];
function snapshotState() {
  return {
    board: boardState.map((row) => row.slice()),
    currentTurn,
    koPoint: koPoint ? { ...koPoint } : null,
    passCount,
    blackCaptures,
    whiteCaptures,
    gameOver
  };
}

function rebuildStonesFromBoardState() {
  placedStones.forEach((s) => { scene.remove(s.stoneMesh); scene.remove(s.ringMesh); });
  placedStones.length = 0;

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const color = boardState[r][c];
      if (color === EMPTY) continue;

      const pos = new THREE.Vector3();
      gridPosition(r, c, pos);

      const mat = color === BLACK ? stoneAssets.blackMat : stoneAssets.whiteMat;
      const stoneMesh = new THREE.Mesh(stoneAssets.stoneGeo, mat);
      stoneMesh.position.copy(pos);
      stoneMesh.position.y += 0.003;
      scene.add(stoneMesh);

      const ringMesh = new THREE.Mesh(stoneAssets.ringGeo, stoneAssets.ringMat);
      ringMesh.position.copy(pos);
      ringMesh.position.y += 0.001;
      scene.add(ringMesh);

      placedStones.push({ row: r, col: c, stoneMesh, ringMesh, color });
    }
  }
}

function doUndo() {
  if (moveHistory.length === 0) {
    log('Nothing to undo');
    return;
  }
  if (markingDeadStones) {
    markingDeadStones = false;
    deadMarkers.forEach((xMesh) => scene.remove(xMesh));
    deadMarkers.clear();
    document.getElementById('finalize-btn').style.display = 'none';
    log('Cancelled dead-stone marking to undo');
  }
  const snap = moveHistory.pop();
  boardState = snap.board.map((row) => row.slice());
  currentTurn = snap.currentTurn;
  koPoint = snap.koPoint;
  passCount = snap.passCount;
  blackCaptures = snap.blackCaptures;
  whiteCaptures = snap.whiteCaptures;
  gameOver = snap.gameOver;

  rebuildStonesFromBoardState();
  updateCapturesUI();
  if (!gameOver) updateTurnStatus();
  log('Move undone');
}

function doClearStones() {
  placedStones.forEach((s) => { scene.remove(s.stoneMesh); scene.remove(s.ringMesh); });
  placedStones.length = 0;
  moveHistory.length = 0;
  resetBoardState();
  updateTurnStatus();
  log('Stones cleared — calibration kept, ready for a new test game');
}

document.getElementById('undo-btn').addEventListener('click', doUndo);
document.getElementById('clear-stones-btn').addEventListener('click', doClearStones);

function neighborsOf(row, col) {
  const list = [];
  if (row > 0) list.push([row - 1, col]);
  if (row < GRID_SIZE - 1) list.push([row + 1, col]);
  if (col > 0) list.push([row, col - 1]);
  if (col < GRID_SIZE - 1) list.push([row, col + 1]);
  return list;
}

function getGroup(row, col) {
  const color = boardState[row][col];
  const visited = new Set();
  const stack = [[row, col]];
  const group = [];
  while (stack.length) {
    const [r, c] = stack.pop();
    const key = r + ',' + c;
    if (visited.has(key)) continue;
    visited.add(key);
    group.push([r, c]);
    neighborsOf(r, c).forEach(([nr, nc]) => {
      if (boardState[nr][nc] === color && !visited.has(nr + ',' + nc)) stack.push([nr, nc]);
    });
  }
  return group;
}

function groupLiberties(group) {
  const libs = new Set();
  group.forEach(([r, c]) => {
    neighborsOf(r, c).forEach(([nr, nc]) => {
      if (boardState[nr][nc] === EMPTY) libs.add(nr + ',' + nc);
    });
  });
  return libs.size;
}

function updateTurnStatus() {
  const turnName = currentTurn === BLACK ? 'Black' : 'White';
  statusEl.textContent = `${turnName}'s turn — tap a dot to place a stone.`;
}

// --- Pass / Resign / Scoring ---
function doPass() {
  if (gameOver || markingDeadStones) { log('Not available right now'); return; }
  moveHistory.push(snapshotState());
  const turnName = currentTurn === BLACK ? 'Black' : 'White';
  log(`${turnName} passes`);
  passCount++;
  koPoint = null; // any non-recapture action clears the ko restriction
  if (passCount >= 2) {
    enterDeadStoneMarking();
    return;
  }
  currentTurn = currentTurn === BLACK ? WHITE : BLACK;
  updateTurnStatus();
}

function enterDeadStoneMarking() {
  markingDeadStones = true;
  document.getElementById('finalize-btn').style.display = 'block';
  statusEl.textContent = 'Both players passed. Tap any stone to mark it dead (X), then hit Finalize Score.';
  log('Entered dead-stone marking phase — tap stones to toggle dead, then Finalize Score');
}

function doResign() {
  if (gameOver || markingDeadStones) { log('Not available right now'); return; }
  moveHistory.push(snapshotState());
  const resigningName = currentTurn === BLACK ? 'Black' : 'White';
  const winnerName = currentTurn === BLACK ? 'White' : 'Black';
  gameOver = true;
  statusEl.textContent = `${resigningName} resigned. ${winnerName} wins!`;
  log(`${resigningName} resigned — ${winnerName} wins`);
}

// Area (Chinese-style) scoring: stones on board + surrounded empty territory
function computeScore() {
  let blackStones = 0, whiteStones = 0;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (boardState[r][c] === BLACK) blackStones++;
      else if (boardState[r][c] === WHITE) whiteStones++;
    }
  }

  let blackTerritory = 0, whiteTerritory = 0;
  const visited = new Set();

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (boardState[r][c] !== EMPTY || visited.has(r + ',' + c)) continue;

      // Flood-fill this empty region, tracking which stone colors border it
      const region = [];
      const borderingColors = new Set();
      const stack = [[r, c]];
      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = cr + ',' + cc;
        if (visited.has(key)) continue;
        visited.add(key);
        region.push([cr, cc]);
        neighborsOf(cr, cc).forEach(([nr, nc]) => {
          const val = boardState[nr][nc];
          if (val === EMPTY && !visited.has(nr + ',' + nc)) stack.push([nr, nc]);
          else if (val === BLACK || val === WHITE) borderingColors.add(val);
        });
      }

      if (borderingColors.size === 1) {
        if (borderingColors.has(BLACK)) blackTerritory += region.length;
        else whiteTerritory += region.length;
      }
      // If bordered by both colors (or somehow neither), it's neutral (dame) — no score either way
    }
  }

  return {
    blackStones, whiteStones, blackTerritory, whiteTerritory,
    blackTotal: blackStones + blackTerritory,
    whiteTotal: whiteStones + whiteTerritory
  };
}

const KOMI = 7.5; // standard compensation for White under area/Chinese scoring rules

function endGame(reason) {
  gameOver = true;
  const score = computeScore();
  const whiteWithKomi = score.whiteTotal + KOMI;
  const winner = score.blackTotal > whiteWithKomi ? 'Black' : whiteWithKomi > score.blackTotal ? 'White' : 'Nobody';
  const margin = Math.abs(score.blackTotal - whiteWithKomi);

  const breakdown = `Black ${score.blackTotal} (${score.blackStones} stones + ${score.blackTerritory} territory) vs White ${score.whiteTotal} (${score.whiteStones} stones + ${score.whiteTerritory} territory) + ${KOMI} komi = ${whiteWithKomi}`;

  const summary = winner === 'Nobody'
    ? `Game over (${reason}). It's a tie! ${breakdown}.`
    : `Game over (${reason}). ${winner} wins by ${margin}! ${breakdown}.`;

  statusEl.textContent = summary;
  log(summary);
}

document.getElementById('pass-btn').addEventListener('click', doPass);
document.getElementById('resign-btn').addEventListener('click', doResign);

const placedStones = []; // {row, col, stoneMesh, ringMesh, color}

function removeStoneAt(row, col) {
  const idx = placedStones.findIndex((s) => s.row === row && s.col === col);
  if (idx !== -1) {
    scene.remove(placedStones[idx].stoneMesh);
    scene.remove(placedStones[idx].ringMesh);
    placedStones.splice(idx, 1);
  }
}

function placeStoneAt(row, col) {
  if (gameOver) {
    log('Game is over — Recalibrate to start a new game');
    return;
  }

  if (boardState[row][col] !== EMPTY) {
    log(`Illegal move: row=${row}, col=${col} is already occupied`);
    return;
  }

  if (koPoint && koPoint.row === row && koPoint.col === col) {
    log(`Illegal move: row=${row}, col=${col} violates the Ko rule (would immediately recreate the previous position) — play elsewhere first`);
    return;
  }

  const preMoveSnapshot = snapshotState(); // captured BEFORE any mutation, for Undo

  const placingColor = currentTurn;
  const opponentColor = placingColor === BLACK ? WHITE : BLACK;

  // Tentatively place, then check for captures of adjacent opponent groups
  boardState[row][col] = placingColor;

  const capturedSet = new Set();
  const neighborList = neighborsOf(row, col);
  log(`DEBUG placing at (${row},${col}): checking ${neighborList.length} neighbors: ${JSON.stringify(neighborList)}`);
  neighborList.forEach(([nr, nc]) => {
    const cellColor = boardState[nr][nc];
    log(`  neighbor (${nr},${nc}) color=${cellColor} (opponent=${opponentColor})`);
    if (cellColor === opponentColor) {
      const group = getGroup(nr, nc);
      const libs = groupLiberties(group);
      log(`  -> opponent group at (${nr},${nc}): size=${group.length}, liberties=${libs}`);
      if (libs === 0) {
        group.forEach(([r, c]) => capturedSet.add(r + ',' + c));
      }
    }
  });

  // Remove captured stones from board state before checking our own liberties
  capturedSet.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    boardState[r][c] = EMPTY;
  });

  const ownGroup = getGroup(row, col);
  const ownLiberties = groupLiberties(ownGroup);

  if (ownLiberties === 0 && capturedSet.size === 0) {
    // Illegal suicide move — undo everything
    boardState[row][col] = EMPTY;
    log(`Illegal move: row=${row}, col=${col} would have no liberties (suicide)`);
    return;
  }

  // Move confirmed legal from here — save the pre-move snapshot for Undo
  moveHistory.push(preMoveSnapshot);

  // Ko rule: if this move was a single stone capturing exactly one opponent
  // stone, the opponent can't immediately recapture at that same point next turn.
  if (capturedSet.size === 1 && ownGroup.length === 1) {
    const [kr, kc] = [...capturedSet][0].split(',').map(Number);
    koPoint = { row: kr, col: kc };
    log(`Ko point set at (${kr},${kc}) — opponent can't immediately recapture there`);
  } else {
    koPoint = null;
  }

  // Legal move — render it
  stoneCount++;
  const pos = new THREE.Vector3();
  gridPosition(row, col, pos);

  const mat = placingColor === BLACK ? stoneAssets.blackMat : stoneAssets.whiteMat;
  const stoneMesh = new THREE.Mesh(stoneAssets.stoneGeo, mat);
  stoneMesh.position.copy(pos);
  stoneMesh.position.y += 0.003;
  scene.add(stoneMesh);

  const ringMesh = new THREE.Mesh(stoneAssets.ringGeo, stoneAssets.ringMat);
  ringMesh.position.copy(pos);
  ringMesh.position.y += 0.001;
  scene.add(ringMesh);

  placedStones.push({ row, col, stoneMesh, ringMesh, color: placingColor });

  // Remove captured stones visually
  capturedSet.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    removeStoneAt(r, c);
  });

  if (capturedSet.size > 0) {
    if (placingColor === BLACK) blackCaptures += capturedSet.size;
    else whiteCaptures += capturedSet.size;
    updateCapturesUI();
  }

  const colorName = placingColor === BLACK ? 'Black' : 'White';
  const captureNote = capturedSet.size > 0 ? ` — captured ${capturedSet.size} stone(s)!` : '';
  log(`${colorName} stone #${stoneCount} placed at row=${row}, col=${col}${captureNote}`);

  passCount = 0;
  currentTurn = opponentColor;
  updateTurnStatus();
}

// --- Tap-to-place: screen-space nearest dot (only active once calibrated) ---
let lastTapTime = 0;
function handleDeadStoneTap(tapX, tapY) {
  const projected2D = [];
  placedStones.forEach((s) => {
    const p = s.stoneMesh.position.clone().project(camera);
    if (p.z > 1) return;
    const screenX = (p.x * 0.5 + 0.5) * window.innerWidth;
    const screenY = (-p.y * 0.5 + 0.5) * window.innerHeight;
    projected2D.push({ stone: s, x: screenX, y: screenY });
  });

  if (projected2D.length === 0) {
    log('No stones on the board to mark');
    return;
  }

  let sampleDist = null;
  const p0 = projected2D[0];
  for (let i = 1; i < projected2D.length; i++) {
    const d = Math.hypot(projected2D[i].x - p0.x, projected2D[i].y - p0.y);
    if (d > 2 && (sampleDist === null || d < sampleDist)) sampleDist = d;
  }
  const radius = Math.min(90, Math.max(18, (sampleDist || 40) * 0.65));

  let closest = null, closestDist = Infinity;
  projected2D.forEach(({ stone, x, y }) => {
    const dist = Math.hypot(x - tapX, y - tapY);
    if (dist < closestDist) { closestDist = dist; closest = stone; }
  });

  if (closest && closestDist < radius) {
    toggleDeadStone(closest.row, closest.col);
  } else {
    log(`Dead-mark tap missed — nearest stone was ${closestDist.toFixed(0)}px away`);
  }
}

function toggleDeadStone(row, col) {
  const stone = placedStones.find((s) => s.row === row && s.col === col);
  if (!stone) return;

  const group = getGroup(row, col); // all connected same-color stones, same logic used for captures
  const key = row + ',' + col;
  const alreadyDead = deadMarkers.has(key);

  if (alreadyDead) {
    group.forEach(([r, c]) => {
      const k = r + ',' + c;
      if (deadMarkers.has(k)) {
        scene.remove(deadMarkers.get(k));
        deadMarkers.delete(k);
      }
    });
    log(`Unmarked dead group of ${group.length} stone(s), starting at (${row},${col})`);
  } else {
    // Black stones get a white X, White stones get a black X — opposite color for visibility
    const xColor = stone.color === BLACK ? 0xffffff : 0x000000;
    group.forEach(([r, c]) => {
      const k = r + ',' + c;
      if (deadMarkers.has(k)) return;
      const s = placedStones.find((ps) => ps.row === r && ps.col === c);
      if (!s) return;
      const xMesh = createXMarker(xColor);
      xMesh.position.copy(s.stoneMesh.position);
      xMesh.position.y += 0.005;
      scene.add(xMesh);
      deadMarkers.set(k, xMesh);
    });
    log(`Marked dead group of ${group.length} stone(s), starting at (${row},${col})`);
  }
}

function finalizeScoreWithDeadStones() {
  deadMarkers.forEach((xMesh, key) => {
    const [r, c] = key.split(',').map(Number);
    const deadColor = boardState[r][c];
    if (deadColor === EMPTY) return;

    if (deadColor === BLACK) whiteCaptures++; else blackCaptures++;
    boardState[r][c] = EMPTY;
    removeStoneAt(r, c);
    scene.remove(xMesh);
  });
  deadMarkers.clear();
  updateCapturesUI();

  markingDeadStones = false;
  document.getElementById('finalize-btn').style.display = 'none';
  endGame('two passes, dead stones removed');
}

document.getElementById('finalize-btn').addEventListener('click', finalizeScoreWithDeadStones);

function onTouchTap(event) {
  if (!gridBuilt) return; // calibration taps are handled via WebXR 'select' instead
  if (event.target.closest && (event.target.closest('.control') || event.target.closest('.adjust-btn'))) return;

  const now = Date.now();
  if (now - lastTapTime < 400) return;
  lastTapTime = now;
  if (event.type === 'touchend') event.preventDefault();

  const touch = event.changedTouches ? event.changedTouches[0] : event;
  const tapX = touch.clientX, tapY = touch.clientY;

  if (markingDeadStones) {
    handleDeadStoneTap(tapX, tapY);
    return;
  }

  const projected2D = [];
  dotMeshes.forEach((mesh) => {
    const p = mesh.position.clone().project(camera);
    if (p.z > 1) return;
    const screenX = (p.x * 0.5 + 0.5) * window.innerWidth;
    const screenY = (-p.y * 0.5 + 0.5) * window.innerHeight;
    projected2D.push({ mesh, x: screenX, y: screenY });
  });

  if (projected2D.length < 2) return;

  let sampleDist = null;
  const p0 = projected2D[0];
  for (let i = 1; i < projected2D.length; i++) {
    const d = Math.hypot(projected2D[i].x - p0.x, projected2D[i].y - p0.y);
    if (d > 2 && (sampleDist === null || d < sampleDist)) sampleDist = d;
  }
  const adaptiveRadius = Math.min(90, Math.max(18, (sampleDist || 40) * 0.65));

  let closest = null, closestDist = Infinity;
  projected2D.forEach(({ mesh, x, y }) => {
    const dist = Math.hypot(x - tapX, y - tapY);
    if (dist < closestDist) { closestDist = dist; closest = mesh; }
  });

  if (closest && closestDist < adaptiveRadius) {
    placeStoneAt(closest.userData.row, closest.userData.col);
  } else {
    log(`Tap missed — nearest dot was ${closestDist.toFixed(0)}px away (radius: ${adaptiveRadius.toFixed(0)}px)`);
  }
}

window.addEventListener('touchend', onTouchTap, { passive: false });
window.addEventListener('click', onTouchTap);

// --- Render loop with hit-test for calibration reticle ---
let renderErrorLogged = false;
function render(timestamp, frame) {
  try {
    if (frame) {
      const referenceSpace = renderer.xr.getReferenceSpace();
      const session = renderer.xr.getSession();

      if (!hitTestSourceRequested) {
        session.requestReferenceSpace('viewer').then((viewerSpace) => {
          session.requestHitTestSource({ space: viewerSpace }).then((source) => {
            hitTestSource = source;
          });
        });
        session.addEventListener('end', () => {
          hitTestSourceRequested = false;
          hitTestSource = null;
          log('XR session ended (either you exited, or the session crashed/was terminated by the OS)');
        });
        hitTestSourceRequested = true;
      }

      if (hitTestSource && !calibrated && !adjusting) {
        const hitTestResults = frame.getHitTestResults(hitTestSource);
        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          reticle.visible = true;
          reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
        } else {
          reticle.visible = false;
        }
      }
    }

    renderer.render(scene, camera);
  } catch (err) {
    if (!renderErrorLogged) {
      renderErrorLogged = true; // avoid flooding the log every frame
      log('RENDER ERROR: ' + err.message);
      console.error(err);
    }
  }
}
