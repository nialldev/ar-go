<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AR Go — WebXR Corner Calibration</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: -apple-system, system-ui, sans-serif; }
  #status {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(0,0,0,0.75); color: white; padding: 10px 60px 10px 14px; font-size: 13px; line-height: 1.4;
  }
  #status.ready { background: rgba(0,120,0,0.75); }
  #log {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 65;
    background: rgba(0,0,0,0.85); color: #0f8; padding: 10px 14px;
    font-family: monospace; font-size: 12px; max-height: 30vh; overflow-y: auto; white-space: pre-wrap;
  }
  #log.visible { display: block; }
  #not-supported {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center;
    color: white; background: #111; text-align: center; padding: 24px; box-sizing: border-box; font-size: 16px; line-height: 1.5;
  }
  #menu-toggle {
    position: fixed; top: calc(env(safe-area-inset-top, 0px) + 40px); right: 8px; z-index: 70; font-size: 20px; padding: 6px 12px;
    background: rgba(0,0,0,0.8); color: white; border: none; border-radius: 8px;
  }
  #menu-panel {
    display: none; position: fixed; top: calc(env(safe-area-inset-top, 0px) + 82px); right: 8px; z-index: 70;
    background: rgba(20,20,20,0.95); border-radius: 10px; padding: 8px;
    display: flex; flex-direction: column; gap: 6px; min-width: 150px;
  }
  #menu-panel button {
    font-size: 14px; padding: 10px 12px; border: none; border-radius: 6px; background: #eee; color: #111;
  }
  #menu-panel button#finalize-btn { background: #0a0; color: white; }
  #captures {
    position: fixed; top: 52px; left: 0; right: 0; z-index: 55; text-align: center; color: white;
    font-size: 13px; background: rgba(0,0,0,0.6); padding: 4px;
  }
  .adjust-btn {
    font-size: 13px; padding: 8px 12px; z-index: 61;
  }
</style>
</head>
<body>

<div id="status">Tap "Start AR", then tap your board's 4 corners in order: top-left, top-right, bottom-left, bottom-right.</div>
<div id="captures">Captures — Black: 0 &nbsp; White: 0</div>
<div id="log">Waiting to start...</div>
<div id="not-supported" style="display:none;"></div>

<button id="menu-toggle">☰</button>
<button id="confirm-move-btn" style="display:none; position:fixed; top:130px; left:50%; transform:translateX(-50%); z-index:70; font-size:14px; padding:10px 18px; background:#0a0; color:white; border:none; border-radius:10px;">Confirm My Move</button>
<div id="menu-panel">
  <button id="pass-btn">Pass</button>
  <button id="resign-btn">Resign</button>
  <button id="undo-btn">Undo</button>
  <button id="clear-stones-btn">Clear Stones</button>
  <button id="recalibrate">Recalibrate</button>
  <button id="finalize-btn" style="display:none;">Finalize Score</button>
  <button id="restore-btn" style="display:none;">Restore Previous Game</button>
  <button id="adjust-corners-btn">Adjust Corners</button>
  <button id="toggle-log-btn">Show Log</button>
  <button id="coord-mode-btn">Camera Coord: normal</button>
  <button id="show-heatmap-btn">Show Heatmap</button>
  <button id="clear-heatmap-btn">Clear Heatmap</button>
</div>

<div id="adjust-ui" style="display:none; position:fixed; bottom:70px; left:0; right:0; z-index:60; background:rgba(0,0,0,0.9); padding:10px; font-family:-apple-system, system-ui, sans-serif;">
  <div style="display:flex; gap:6px; justify-content:center; margin-bottom:8px;">
    <button class="corner-select adjust-btn" data-corner="0">TL</button>
    <button class="corner-select adjust-btn" data-corner="1">TR</button>
    <button class="corner-select adjust-btn" data-corner="2">BL</button>
    <button class="corner-select adjust-btn" data-corner="3">BR</button>
  </div>
  <div style="padding:4px 6px; margin-bottom:8px;">
    <label style="font-size:12px; color:#ccc;">Left ↔ Right (selected corner)</label>
    <input type="range" id="adj-x-slider" min="-0.03" max="0.03" step="0.0005" value="0" style="width:100%;">
  </div>
  <div style="padding:4px 6px; margin-bottom:8px;">
    <label style="font-size:12px; color:#ccc;">Forward ↔ Back (selected corner)</label>
    <input type="range" id="adj-z-slider" min="-0.03" max="0.03" step="0.0005" value="0" style="width:100%;">
  </div>
  <div style="padding:4px 6px; margin-bottom:8px;">
    <label style="font-size:12px; color:#ccc;">Bulk Height (all 4 corners together — fix overall level first)</label>
    <input type="range" id="bulk-height-slider" min="-0.06" max="0.06" step="0.001" value="0" style="width:100%;">
  </div>
  <div style="padding:4px 6px; margin-bottom:8px;">
    <label style="font-size:12px; color:#ccc;">Corner Height (selected corner only — for fine residual tweaks)</label>
    <input type="range" id="corner-height-slider" min="-0.04" max="0.04" step="0.0005" value="0" style="width:100%;">
  </div>
  <div style="display:flex; justify-content:center; gap:8px;">
    <button id="adj-confirm" class="adjust-btn" style="background:#0a0; color:white;">Confirm & Build Grid</button>
    <button id="adj-cancel" class="adjust-btn" style="background:#a00; color:white;">Cancel</button>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

const GRID_SIZE = 19;
let camera, scene, renderer;
let reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;

const cornerNames = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
let corners = []; // THREE.Vector3[] — derived every frame as cornerBasePosition + cornerOffsets
let cornerBasePosition = [null, null, null, null]; // raw tracked position per corner (continuously refined by its anchor, if supported)
let cornerOffsets = [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()]; // your fine-tune nudges, layered on top of the base
let cornerAnchors = [null, null, null, null]; // XRAnchor objects, once created
let latestHitTestResult = null; // updated every frame during the pre-calibration hit-test phase
let cornersBackup = []; // snapshot of cornerOffsets taken when entering fine-tune mode, for Cancel
let calibrated = false;
let adjusting = false;
let selectedCorner = 0;

const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(msg) {
  logEl.textContent = msg + '\n' + logEl.textContent;
}

window.addEventListener('error', (e) => log('ERROR: ' + e.message));

try {
  init();
} catch (err) {
  log('init() failed: ' + err.message);
}

function init() {
  const container = document.createElement('div');
  document.body.appendChild(container);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
  light.position.set(0.5, 1, 0.25);
  scene.add(light);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  container.appendChild(renderer.domElement);

  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
      if (!supported) {
        showNotSupported("WebXR AR isn't supported on this device/browser. Try the latest Chrome on Android.");
      } else {
        document.body.appendChild(ARButton.createButton(renderer, {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay', 'anchors', 'camera-access'],
          domOverlay: { root: document.body }
        }));
      }
    }).catch((err) => showNotSupported('isSessionSupported check failed: ' + err.message));
  } else {
    showNotSupported("WebXR isn't available in this browser.");
  }

  // Reticle: hollow ring + crosshair for clearer aiming than a solid-looking blob
  reticle = new THREE.Group();
  const ringGeo = new THREE.RingGeometry(0.045, 0.05, 32).rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide });
  reticle.add(new THREE.Mesh(ringGeo, ringMat));

  const crossMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
  const barGeo = new THREE.BoxGeometry(0.09, 0.002, 0.002);
  const crossH = new THREE.Mesh(barGeo, crossMat);
  reticle.add(crossH);
  const crossV = new THREE.Mesh(barGeo, crossMat);
  crossV.rotation.y = Math.PI / 2;
  reticle.add(crossV);

  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  const controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  window.addEventListener('resize', onWindowResize);
  renderer.domElement.addEventListener('webglcontextlost', (e) => {
    e.preventDefault();
    log('!!! WEBGL CONTEXT LOST !!! This is likely why the screen went black — a GPU-level crash, not a JS error. Try reloading the page.');
  });
  renderer.domElement.addEventListener('webglcontextrestored', () => {
    log('WebGL context restored');
  });

  renderer.setAnimationLoop(render);
}

function showNotSupported(message) {
  statusEl.style.display = 'none';
  const el = document.getElementById('not-supported');
  el.style.display = 'flex';
  el.textContent = message;
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- Corner calibration via hit-test taps ---
const cornerMarkers = []; // THREE.Mesh[] — one per tapped corner, kept so we can move them during adjustment

function createXMarker(color) {
  const group = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color });
  const barGeo = new THREE.BoxGeometry(0.018, 0.001, 0.003);
  const bar1 = new THREE.Mesh(barGeo, mat);
  bar1.rotation.y = Math.PI / 4;
  group.add(bar1);
  const bar2 = new THREE.Mesh(barGeo, mat);
  bar2.rotation.y = -Math.PI / 4;
  group.add(bar2);
  return group;
}

function createRingCrosshairMarker(color) {
  const group = new THREE.Group();
  const ringGeo = new THREE.RingGeometry(0.02, 0.024, 32).rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
  group.add(new THREE.Mesh(ringGeo, ringMat));

  const crossMat = new THREE.MeshBasicMaterial({ color });
  const barGeo = new THREE.BoxGeometry(0.04, 0.002, 0.002);
  const crossH = new THREE.Mesh(barGeo, crossMat);
  group.add(crossH);
  const crossV = new THREE.Mesh(barGeo, crossMat);
  crossV.rotation.y = Math.PI / 2;
  group.add(crossV);

  return group;
}

function onSelect() {
  if (adjusting) return; // fine-tuning is handled entirely by the DOM buttons now

  if (!reticle.visible) {
    log('Tap ignored: no surface detected right now (reticle not visible)');
    return;
  }

  if (!calibrated) {
    const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
    const idx = corners.length; // 0..3, this tap's corner index
    cornerBasePosition[idx] = pos.clone();
    cornerOffsets[idx] = new THREE.Vector3();
    corners.push(pos.clone());
    log(`Corner ${idx + 1} (${cornerNames[idx]}) placed at x=${pos.x.toFixed(3)}, y=${pos.y.toFixed(3)}, z=${pos.z.toFixed(3)}`);

    const marker = createRingCrosshairMarker(0x00ff88);
    marker.position.copy(pos);
    scene.add(marker);
    cornerMarkers.push(marker);

    // Try to upgrade this tap into a continuously-tracked anchor — the
    // underlying system keeps refining its position over time, which is far
    // more robust against tracking drift/jumps than a one-time snapshot.
    if (latestHitTestResult && typeof latestHitTestResult.createAnchor === 'function') {
      latestHitTestResult.createAnchor().then((anchor) => {
        cornerAnchors[idx] = anchor;
        log(`Corner ${idx + 1}: tracked anchor active`);
      }).catch((err) => {
        log(`Corner ${idx + 1}: anchor creation failed, using a fixed position instead (${err.message})`);
      });
    } else {
      log(`Corner ${idx + 1}: anchors not supported here, using a fixed position`);
    }

    if (corners.length < 4) {
      statusEl.textContent = `Corner ${corners.length}/4 placed. Now tap the board's ${cornerNames[corners.length]} corner.`;
    } else {
      log('4th corner placed — switching to fine-tune mode');
      adjusting = true;
      selectedCorner = 0;
      reticle.visible = false;
      cornersBackup = cornerOffsets.map((o) => o.clone());
      showAdjustUI();
      updateAdjustStatus();
    }
    return;
  }
}

function updateAdjustStatus() {
  statusEl.textContent = `Fine-tune corners: adjusting ${cornerNames[selectedCorner]}. Use arrows to nudge it onto the real corner, then tap another corner button or Confirm.`;
}

function correctCornersToRectangle() {
  // A real board is a perfect rectangle — reconstruct an ideal parallelogram
  // from the 4 taps instead of trusting each one exactly. Any skew between
  // opposite edges is treated as tap noise and averaged out. The correction
  // is stored as a permanent offset (not a direct overwrite), so it keeps
  // working correctly even as anchors continue refining their base position.
  const tl = corners[0], tr = corners[1], bl = corners[2], br = corners[3];

  const widthVec = new THREE.Vector3()
    .addVectors(new THREE.Vector3().subVectors(tr, tl), new THREE.Vector3().subVectors(br, bl))
    .multiplyScalar(0.5);
  const heightVec = new THREE.Vector3()
    .addVectors(new THREE.Vector3().subVectors(bl, tl), new THREE.Vector3().subVectors(br, tr))
    .multiplyScalar(0.5);
  const center = new THREE.Vector3()
    .add(tl).add(tr).add(bl).add(br)
    .multiplyScalar(0.25);

  const halfW = widthVec.clone().multiplyScalar(0.5);
  const halfH = heightVec.clone().multiplyScalar(0.5);
  const idealCorners = [
    center.clone().sub(halfW).sub(halfH), // TL
    center.clone().add(halfW).sub(halfH), // TR
    center.clone().sub(halfW).add(halfH), // BL
    center.clone().add(halfW).add(halfH)  // BR
  ];

  for (let i = 0; i < 4; i++) {
    const base = cornerBasePosition[i] || corners[i];
    cornerOffsets[i] = idealCorners[i].clone().sub(base);
    corners[i].copy(idealCorners[i]);
  }
  log('Corners geometrically corrected to an ideal rectangle, averaging out tap noise');
}

function finalizeCalibration() {
  try {
    adjusting = false;
    calibrated = true;
    hideAdjustUI();
    cornerMarkers.forEach((m) => scene.remove(m));
    statusEl.classList.add('ready');

    correctCornersToRectangle();

    buildGrid();
    resetBoardState();
    updateTurnStatus();

    const saved = loadGameState();
    if (saved) {
      pendingRestoreData = saved;
      document.getElementById('restore-btn').style.display = 'block';
      log('A previous game was found — tap Restore Previous Game in the menu to bring it back, or just start playing for a new game');
    }

    updateConfirmButtonVisibility();
  } catch (err) {
    log('ERROR in finalizeCalibration/buildGrid: ' + err.message);
    console.error(err);
  }
}

// --- Lighter re-adjustment path: tweak an EXISTING calibration without
// re-tapping all 4 corners or losing the current game in progress ---
let isReAdjusting = false;

function startAdjustCorners() {
  if (!calibrated) { log('Calibrate first'); return; }
  isReAdjusting = true;
  adjusting = true;
  selectedCorner = 0;
  cornersBackup = cornerOffsets.map((o) => o.clone());

  cornerMarkers.length = 0;
  corners.forEach((pos) => {
    const marker = createRingCrosshairMarker(0x00ff88);
    marker.position.copy(pos);
    scene.add(marker);
    cornerMarkers.push(marker);
  });

  showAdjustUI();
  updateAdjustStatus();
  log('Adjusting existing corners — your game is not affected until you Confirm');
}

function finalizeAdjustment() {
  try {
    isReAdjusting = false;
    adjusting = false;
    hideAdjustUI();
    cornerMarkers.forEach((m) => scene.remove(m));
    cornerMarkers.length = 0;

    correctCornersToRectangle();

    buildGrid(); // rebuilds dots/lines fresh from the adjusted corners
    rebuildStonesFromBoardState(); // reposition any existing stones to match
    updateTurnStatus();
    log('Calibration adjusted — grid and stones repositioned, game state kept');
  } catch (err) {
    log('ERROR in finalizeAdjustment: ' + err.message);
    console.error(err);
  }
}

function cancelAdjustment() {
  if (cornersBackup.length !== 4) { log('Nothing to cancel back to'); return; }

  cornerOffsets = cornersBackup.map((o) => o.clone());
  for (let i = 0; i < 4; i++) {
    if (cornerBasePosition[i]) {
      corners[i].copy(cornerBasePosition[i]).add(cornerOffsets[i]);
      if (cornerMarkers[i]) cornerMarkers[i].position.copy(corners[i]);
    }
  }
  if (gridBuilt) reapplyGridHeight();

  document.getElementById('bulk-height-slider').value = 0;
  bulkHeightSliderBase = 0;
  document.getElementById('corner-height-slider').value = 0;
  cornerHeightSliderBase = 0;
  document.getElementById('adj-x-slider').value = 0;
  xSliderBase = 0;
  document.getElementById('adj-z-slider').value = 0;
  zSliderBase = 0;
  updateHeightGapIndicator();

  if (isReAdjusting) {
    // Re-adjustment: fully exit back to the game exactly as it was before
    isReAdjusting = false;
    adjusting = false;
    hideAdjustUI();
    cornerMarkers.forEach((m) => scene.remove(m));
    cornerMarkers.length = 0;
    log('Adjustment cancelled — reverted to your previous calibration');
  } else {
    // First-time calibration: just revert the values, stay in fine-tune mode
    log('Reverted to the positions right after your 4 taps');
  }
}

document.getElementById('adjust-corners-btn').addEventListener('click', startAdjustCorners);
document.getElementById('toggle-log-btn').addEventListener('click', () => {
  const isVisible = logEl.classList.toggle('visible');
  document.getElementById('toggle-log-btn').textContent = isVisible ? 'Hide Log' : 'Show Log';
});
document.getElementById('coord-mode-btn').addEventListener('click', () => {
  cameraCoordModeIndex = (cameraCoordModeIndex + 1) % COORD_MODES.length;
  const modeName = COORD_MODES[cameraCoordModeIndex].name;
  document.getElementById('coord-mode-btn').textContent = 'Camera Coord: ' + modeName;
  log('Camera coord mode changed to: ' + modeName);
});
document.getElementById('adj-cancel').addEventListener('click', cancelAdjustment);

let pendingRestoreData = null;

function doRestoreGame() {
  if (!pendingRestoreData) { log('No saved game to restore'); return; }
  const saved = pendingRestoreData;
  boardState = saved.boardState;
  currentTurn = saved.currentTurn;
  koPoint = saved.koPoint;
  passCount = saved.passCount;
  blackCaptures = saved.blackCaptures;
  whiteCaptures = saved.whiteCaptures;
  gameOver = saved.gameOver;
  stoneCount = saved.stoneCount;
  rebuildStonesFromBoardState();
  if (gridBuilt) reapplyGridHeight();
  updateCapturesUI();
  if (!gameOver) updateTurnStatus();
  log('Previous game restored');

  pendingRestoreData = null;
  document.getElementById('restore-btn').style.display = 'none';
}

document.getElementById('restore-btn').addEventListener('click', doRestoreGame);

function resetCalibration() {
  corners = [];
  cornerBasePosition = [null, null, null, null];
  cornerOffsets = [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()];
  cornerAnchors.forEach((a) => { if (a && typeof a.delete === 'function') { try { a.delete(); } catch (e) {} } });
  cornerAnchors = [null, null, null, null];
  calibrated = false;
  adjusting = false;
  cornerMarkers.forEach((m) => scene.remove(m));
  cornerMarkers.length = 0;
  hideAdjustUI();
  clearGrid();
  reticle.visible = false;
  statusEl.classList.remove('ready');
  statusEl.textContent = 'Recalibrating — tap the board\'s top-left corner.';
  pendingConfirmCapture = false;
  updateConfirmButtonVisibility();
  log('Recalibration started');
}

document.getElementById('recalibrate').addEventListener('click', resetCalibration);

function showAdjustUI() {
  document.getElementById('adjust-ui').style.display = 'block';
  highlightSelectedCorner();
  document.getElementById('corner-height-slider').value = 0;
  cornerHeightSliderBase = 0;
  document.getElementById('bulk-height-slider').value = 0;
  bulkHeightSliderBase = 0;
  document.getElementById('adj-x-slider').value = 0;
  xSliderBase = 0;
  document.getElementById('adj-z-slider').value = 0;
  zSliderBase = 0;
  updateHeightGapIndicator();
}
function hideAdjustUI() {
  document.getElementById('adjust-ui').style.display = 'none';
  clearHeightGapIndicator();
}
const DEFAULT_MARKER_COLOR = 0x00ff88;

function setMarkerColor(marker, color) {
  if (!marker) return;
  marker.traverse((obj) => { if (obj.material) obj.material.color.setHex(color); });
}

function updateHeightGapIndicator() {
  // Reset every marker to its default color first
  cornerMarkers.forEach((marker) => setMarkerColor(marker, DEFAULT_MARKER_COLOR));

  if (!adjusting || corners.length < 4) return;

  const otherIndices = [0, 1, 2, 3].filter((i) => i !== selectedCorner);
  const avgOtherY = otherIndices.reduce((sum, i) => sum + corners[i].y, 0) / otherIndices.length;
  const absGap = Math.abs(corners[selectedCorner].y - avgOtherY);

  if (absGap < 0.0005) return; // negligible — leave it at the default color

  // Red when way off, orange when moderate, green-yellow when close — the whole
  // marker changes color so it's obvious at a glance without hunting for a small bar
  const color = absGap > 0.02 ? 0xff2222 : absGap > 0.007 ? 0xffaa00 : 0x88ff00;
  setMarkerColor(cornerMarkers[selectedCorner], color);
}

function clearHeightGapIndicator() {
  cornerMarkers.forEach((marker) => setMarkerColor(marker, DEFAULT_MARKER_COLOR));
}

function highlightSelectedCorner() {
  document.querySelectorAll('.corner-select').forEach((btn) => {
    btn.style.background = (parseInt(btn.dataset.corner) === selectedCorner) ? '#0a0' : '';
    btn.style.color = (parseInt(btn.dataset.corner) === selectedCorner) ? 'white' : '';
  });
}

document.querySelectorAll('.corner-select').forEach((btn) => {
  btn.addEventListener('click', () => {
    log(`Corner-select button clicked: ${btn.textContent} (index ${btn.dataset.corner})`);
    selectedCorner = parseInt(btn.dataset.corner);
    highlightSelectedCorner();
    updateAdjustStatus();
    cornerHeightSlider.value = 0;
    cornerHeightSliderBase = 0;
    xSlider.value = 0;
    xSliderBase = 0;
    zSlider.value = 0;
    zSliderBase = 0;
    updateHeightGapIndicator();
  });
});

// Nudge the selected corner's offset along world X/Z (approximates the board's horizontal plane)
let xSliderBase = 0;
const xSlider = document.getElementById('adj-x-slider');
xSlider.addEventListener('input', (e) => {
  const newVal = parseFloat(e.target.value);
  const delta = newVal - xSliderBase;
  cornerOffsets[selectedCorner].x += delta;
  if (cornerBasePosition[selectedCorner]) corners[selectedCorner].copy(cornerBasePosition[selectedCorner]).add(cornerOffsets[selectedCorner]);
  cornerMarkers[selectedCorner].position.copy(corners[selectedCorner]);
  xSliderBase = newVal;
  updateHeightGapIndicator();
  if (gridBuilt) reapplyGridHeight();
});

let zSliderBase = 0;
const zSlider = document.getElementById('adj-z-slider');
zSlider.addEventListener('input', (e) => {
  const newVal = parseFloat(e.target.value);
  const delta = newVal - zSliderBase;
  cornerOffsets[selectedCorner].z += delta;
  if (cornerBasePosition[selectedCorner]) corners[selectedCorner].copy(cornerBasePosition[selectedCorner]).add(cornerOffsets[selectedCorner]);
  cornerMarkers[selectedCorner].position.copy(corners[selectedCorner]);
  zSliderBase = newVal;
  updateHeightGapIndicator();
  if (gridBuilt) reapplyGridHeight();
});
let bulkHeightSliderBase = 0;
const bulkHeightSlider = document.getElementById('bulk-height-slider');
bulkHeightSlider.addEventListener('input', (e) => {
  const newVal = parseFloat(e.target.value);
  const delta = newVal - bulkHeightSliderBase;
  cornerOffsets.forEach((o, i) => {
    o.y += delta;
    if (cornerBasePosition[i]) corners[i].copy(cornerBasePosition[i]).add(o);
    if (cornerMarkers[i]) cornerMarkers[i].position.copy(corners[i]);
  });
  bulkHeightSliderBase = newVal;
  updateHeightGapIndicator();
  if (gridBuilt) reapplyGridHeight();
});

let cornerHeightSliderBase = 0;
const cornerHeightSlider = document.getElementById('corner-height-slider');
cornerHeightSlider.addEventListener('input', (e) => {
  const newVal = parseFloat(e.target.value);
  const delta = newVal - cornerHeightSliderBase;
  cornerOffsets[selectedCorner].y += delta;
  if (cornerBasePosition[selectedCorner]) corners[selectedCorner].copy(cornerBasePosition[selectedCorner]).add(cornerOffsets[selectedCorner]);
  cornerMarkers[selectedCorner].position.copy(corners[selectedCorner]);
  cornerHeightSliderBase = newVal;
  updateHeightGapIndicator();
  if (gridBuilt) reapplyGridHeight();
});

document.getElementById('adj-confirm').addEventListener('click', () => {
  if (isReAdjusting) finalizeAdjustment();
  else finalizeCalibration();
});

// --- Grid construction (reusing the same bilinear approach, now from 4 fixed real-world taps) ---
const dotMeshes = [];
let lineMeshes = [];
const stoneAssets = {};
let stoneCount = 0;
let gridBuilt = false;

function gridPosition(row, col, target) {
  const u = col / (GRID_SIZE - 1);
  const v = row / (GRID_SIZE - 1);
  const tl = corners[0], tr = corners[1], bl = corners[2], br = corners[3];

  target.x = tl.x * (1 - u) * (1 - v) + tr.x * u * (1 - v) + bl.x * (1 - u) * v + br.x * u * v;
  target.y = tl.y * (1 - u) * (1 - v) + tr.y * u * (1 - v) + bl.y * (1 - u) * v + br.y * u * v;
  target.z = tl.z * (1 - u) * (1 - v) + tr.z * u * (1 - v) + bl.z * (1 - u) * v + br.z * u * v;
  return target;
}

const LINE_THICKNESS = 0.002;

function reapplyGridHeight() {
  const tmp = new THREE.Vector3();

  dotMeshes.forEach((mesh) => {
    gridPosition(mesh.userData.row, mesh.userData.col, tmp);
    mesh.position.copy(tmp);
  });

  let idx = 0;
  const a = new THREE.Vector3(), b = new THREE.Vector3();
  for (let row = 0; row < GRID_SIZE; row++) {
    gridPosition(row, 0, a);
    gridPosition(row, GRID_SIZE - 1, b);
    positionLineMesh(lineMeshes[idx++], a, b);
  }
  for (let col = 0; col < GRID_SIZE; col++) {
    gridPosition(0, col, a);
    gridPosition(GRID_SIZE - 1, col, b);
    positionLineMesh(lineMeshes[idx++], a, b);
  }

  placedStones.forEach((s) => {
    gridPosition(s.row, s.col, tmp);
    s.stoneMesh.position.copy(tmp);
    s.stoneMesh.position.y += 0.003;
    s.ringMesh.position.copy(tmp);
    s.ringMesh.position.y += 0.001;
  });
}
function positionLineMesh(mesh, a, b) {
  const mid = a.clone().add(b).multiplyScalar(0.5);
  const dir = b.clone().sub(a);
  const length = Math.max(dir.length(), 0.0001);
  mesh.position.copy(mid);
  mesh.scale.set(length, LINE_THICKNESS, LINE_THICKNESS);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), dir.normalize());
}

function clearGrid() {
  dotMeshes.forEach((m) => scene.remove(m));
  dotMeshes.length = 0;
  lineMeshes.forEach((m) => scene.remove(m));
  lineMeshes.length = 0;
  placedStones.forEach((s) => { scene.remove(s.stoneMesh); scene.remove(s.ringMesh); });
  placedStones.length = 0;
  stoneCount = 0;
  gridBuilt = false;
  resetBoardState();
}

function buildGrid() {
  // Clear any previous grid visuals first — needed since this can now be called
  // again during corner re-adjustment, not just once at initial calibration.
  dotMeshes.forEach((m) => scene.remove(m));
  dotMeshes.length = 0;
  lineMeshes.forEach((m) => scene.remove(m));
  lineMeshes.length = 0;

  const dotGeo = new THREE.SphereGeometry(0.005, 8, 8);

  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      const mesh = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0 }));
      mesh.userData.row = row;
      mesh.userData.col = col;
      gridPosition(row, col, mesh.position);
      scene.add(mesh);
      dotMeshes.push(mesh);
    }
  }

  const lineBoxGeo = new THREE.BoxGeometry(1, 1, 1);
  const lineBoxMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
  const a = new THREE.Vector3(), b = new THREE.Vector3();

  // Simple continuous lines (one per row/col) — the per-cell gap-around-stones
  // approach was reverted for now, may revisit later.
  for (let row = 0; row < GRID_SIZE; row++) {
    const mesh = new THREE.Mesh(lineBoxGeo, lineBoxMat);
    gridPosition(row, 0, a);
    gridPosition(row, GRID_SIZE - 1, b);
    positionLineMesh(mesh, a, b);
    scene.add(mesh);
    lineMeshes.push(mesh);
  }
  for (let col = 0; col < GRID_SIZE; col++) {
    const mesh = new THREE.Mesh(lineBoxGeo, lineBoxMat);
    gridPosition(0, col, a);
    gridPosition(GRID_SIZE - 1, col, b);
    positionLineMesh(mesh, a, b);
    scene.add(mesh);
    lineMeshes.push(mesh);
  }

  stoneAssets.blackMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  stoneAssets.whiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  stoneAssets.stoneGeo = new THREE.CylinderGeometry(0.011, 0.011, 0.006, 24);
  stoneAssets.ringGeo = new THREE.RingGeometry(0.0115, 0.0145, 24).rotateX(-Math.PI / 2);
  stoneAssets.ringMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, side: THREE.DoubleSide });

  gridBuilt = true;
  reticle.visible = false;
}

// --- Go rules engine ---
const EMPTY = 0, BLACK = 1, WHITE = 2;
let boardState = [];
for (let r = 0; r < GRID_SIZE; r++) boardState.push(new Array(GRID_SIZE).fill(EMPTY));
let currentTurn = BLACK;
let koPoint = null;
let passCount = 0;
let gameOver = false;
let blackCaptures = 0; // stones Black has captured (i.e. White stones removed)
let whiteCaptures = 0; // stones White has captured
let markingDeadStones = false;
const deadMarkers = new Map(); // 'row,col' -> X marker mesh (Group), on stones
const territoryMarkers = new Map(); // 'row,col' -> X marker mesh (Group), on empty territory points

// --- Save/restore game state, so a crash or reload doesn't lose the game ---
const SAVE_KEY = 'ar_go_save_v1';

function saveGameState() {
  try {
    const data = { boardState, currentTurn, koPoint, passCount, blackCaptures, whiteCaptures, gameOver, stoneCount };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {
    log('Could not save game state: ' + e.message);
  }
}

function loadGameState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function clearSavedGameState() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

function resetBoardState() {
  boardState = [];
  for (let r = 0; r < GRID_SIZE; r++) boardState.push(new Array(GRID_SIZE).fill(EMPTY));
  currentTurn = BLACK;
  koPoint = null;
  passCount = 0;
  gameOver = false;
  blackCaptures = 0;
  whiteCaptures = 0;
  updateCapturesUI();
  markingDeadStones = false;
  deadMarkers.forEach((xMesh) => scene.remove(xMesh));
  deadMarkers.clear();
  clearTerritoryMarkers();
  document.getElementById('finalize-btn').style.display = 'none';
}

function updateCapturesUI() {
  document.getElementById('captures').textContent = `Captures — Black: ${blackCaptures}   White: ${whiteCaptures}`;
}

// --- Move history (full-state snapshots) for reliable Undo ---
const moveHistory = [];
function snapshotState() {
  return {
    board: boardState.map((row) => row.slice()),
    currentTurn,
    koPoint: koPoint ? { ...koPoint } : null,
    passCount,
    blackCaptures,
    whiteCaptures,
    gameOver
  };
}

function rebuildStonesFromBoardState() {
  placedStones.forEach((s) => { scene.remove(s.stoneMesh); scene.remove(s.ringMesh); });
  placedStones.length = 0;

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const color = boardState[r][c];
      if (color === EMPTY) continue;

      const pos = new THREE.Vector3();
      gridPosition(r, c, pos);

      const mat = color === BLACK ? stoneAssets.blackMat : stoneAssets.whiteMat;
      const stoneMesh = new THREE.Mesh(stoneAssets.stoneGeo, mat);
      stoneMesh.position.copy(pos);
      stoneMesh.position.y += 0.003;
      scene.add(stoneMesh);

      const ringMesh = new THREE.Mesh(stoneAssets.ringGeo, stoneAssets.ringMat);
      ringMesh.position.copy(pos);
      ringMesh.position.y += 0.001;
      scene.add(ringMesh);

      placedStones.push({ row: r, col: c, stoneMesh, ringMesh, color });
    }
  }
}

function doUndo() {
  if (moveHistory.length === 0) {
    log('Nothing to undo');
    return;
  }
  if (markingDeadStones) {
    markingDeadStones = false;
    deadMarkers.forEach((xMesh) => scene.remove(xMesh));
    deadMarkers.clear();
    clearTerritoryMarkers();
    document.getElementById('finalize-btn').style.display = 'none';
    log('Cancelled dead-stone marking to undo');
  }
  const snap = moveHistory.pop();
  boardState = snap.board.map((row) => row.slice());
  currentTurn = snap.currentTurn;
  koPoint = snap.koPoint;
  passCount = snap.passCount;
  blackCaptures = snap.blackCaptures;
  whiteCaptures = snap.whiteCaptures;
  gameOver = snap.gameOver;

  rebuildStonesFromBoardState();
  if (gridBuilt) reapplyGridHeight();
  updateCapturesUI();
  if (!gameOver) updateTurnStatus();
  log('Move undone');
  saveGameState();
}

function doClearStones() {
  placedStones.forEach((s) => { scene.remove(s.stoneMesh); scene.remove(s.ringMesh); });
  placedStones.length = 0;
  moveHistory.length = 0;
  resetBoardState();
  updateTurnStatus();
  clearSavedGameState();
  pendingRestoreData = null;
  document.getElementById('restore-btn').style.display = 'none';
  updateConfirmButtonVisibility();
  log('Stones cleared — calibration kept, ready for a new test game');
}

document.getElementById('undo-btn').addEventListener('click', doUndo);
document.getElementById('clear-stones-btn').addEventListener('click', doClearStones);

function neighborsOf(row, col) {
  const list = [];
  if (row > 0) list.push([row - 1, col]);
  if (row < GRID_SIZE - 1) list.push([row + 1, col]);
  if (col > 0) list.push([row, col - 1]);
  if (col < GRID_SIZE - 1) list.push([row, col + 1]);
  return list;
}

function getGroup(row, col) {
  const color = boardState[row][col];
  const visited = new Set();
  const stack = [[row, col]];
  const group = [];
  while (stack.length) {
    const [r, c] = stack.pop();
    const key = r + ',' + c;
    if (visited.has(key)) continue;
    visited.add(key);
    group.push([r, c]);
    neighborsOf(r, c).forEach(([nr, nc]) => {
      if (boardState[nr][nc] === color && !visited.has(nr + ',' + nc)) stack.push([nr, nc]);
    });
  }
  return group;
}

function groupLiberties(group) {
  const libs = new Set();
  group.forEach(([r, c]) => {
    neighborsOf(r, c).forEach(([nr, nc]) => {
      if (boardState[nr][nc] === EMPTY) libs.add(nr + ',' + nc);
    });
  });
  return libs.size;
}

function updateTurnStatus() {
  const turnName = currentTurn === BLACK ? 'Black' : 'White';
  statusEl.textContent = `${turnName}'s turn — tap a dot to place a stone.`;
}

// --- Pass / Resign / Scoring ---
function doPass() {
  if (gameOver || markingDeadStones) { log('Not available right now'); return; }
  moveHistory.push(snapshotState());
  const turnName = currentTurn === BLACK ? 'Black' : 'White';
  log(`${turnName} passes`);
  passCount++;
  koPoint = null; // any non-recapture action clears the ko restriction
  if (passCount >= 2) {
    enterDeadStoneMarking();
    saveGameState();
    return;
  }
  currentTurn = currentTurn === BLACK ? WHITE : BLACK;
  updateTurnStatus();
  saveGameState();
}

function enterDeadStoneMarking() {
  markingDeadStones = true;
  document.getElementById('finalize-btn').style.display = 'block';
  statusEl.textContent = 'Both players passed. Tap any stone to mark it dead (X), then hit Finalize Score.';
  log('Entered dead-stone marking phase — tap stones to toggle dead, then Finalize Score');
  updateTerritoryPreview();
  updateConfirmButtonVisibility();
}

function doResign() {
  if (gameOver || markingDeadStones) { log('Not available right now'); return; }
  moveHistory.push(snapshotState());
  const resigningName = currentTurn === BLACK ? 'Black' : 'White';
  const winnerName = currentTurn === BLACK ? 'White' : 'Black';
  gameOver = true;
  statusEl.textContent = `${resigningName} resigned. ${winnerName} wins!`;
  log(`${resigningName} resigned — ${winnerName} wins`);
  saveGameState();
  updateConfirmButtonVisibility();
}

// Area (Chinese-style) scoring: stones on board + surrounded empty territory
function computeTerritoryRegions(board) {
  const regions = [];
  const visited = new Set();
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (board[r][c] !== EMPTY || visited.has(r + ',' + c)) continue;

      const region = [];
      const borderingColors = new Set();
      const stack = [[r, c]];
      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = cr + ',' + cc;
        if (visited.has(key)) continue;
        visited.add(key);
        region.push([cr, cc]);
        neighborsOf(cr, cc).forEach(([nr, nc]) => {
          const val = board[nr][nc];
          if (val === EMPTY && !visited.has(nr + ',' + nc)) stack.push([nr, nc]);
          else if (val === BLACK || val === WHITE) borderingColors.add(val);
        });
      }

      const owner = borderingColors.size === 1 ? [...borderingColors][0] : null;
      regions.push({ region, owner });
    }
  }
  return regions;
}

function computeScore() {
  let blackStones = 0, whiteStones = 0;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (boardState[r][c] === BLACK) blackStones++;
      else if (boardState[r][c] === WHITE) whiteStones++;
    }
  }

  let blackTerritory = 0, whiteTerritory = 0;
  computeTerritoryRegions(boardState).forEach(({ region, owner }) => {
    if (owner === BLACK) blackTerritory += region.length;
    else if (owner === WHITE) whiteTerritory += region.length;
    // owner === null means contested/neutral (dame) — no score either way
  });

  return {
    blackStones, whiteStones, blackTerritory, whiteTerritory,
    blackTotal: blackStones + blackTerritory,
    whiteTotal: whiteStones + whiteTerritory
  };
}

function clearTerritoryMarkers() {
  territoryMarkers.forEach((m) => scene.remove(m));
  territoryMarkers.clear();
}

// Shows an X (in the owning color) on every empty point that's currently
// unambiguously one player's territory. Areas still touching an unmarked
// (undecided) stone of both colors stay unmarked, since ownership isn't settled yet.
function updateTerritoryPreview() {
  clearTerritoryMarkers();

  const virtualBoard = boardState.map((row) => row.slice());
  deadMarkers.forEach((_, key) => {
    const [r, c] = key.split(',').map(Number);
    virtualBoard[r][c] = EMPTY;
  });

  computeTerritoryRegions(virtualBoard).forEach(({ region, owner }) => {
    if (!owner) return; // contested/neutral — leave unmarked
    const xColor = owner === BLACK ? 0x000000 : 0xffffff;
    region.forEach(([r, c]) => {
      const pos = new THREE.Vector3();
      gridPosition(r, c, pos);
      const xMesh = createXMarker(xColor);
      xMesh.position.copy(pos);
      xMesh.position.y += 0.001;
      scene.add(xMesh);
      territoryMarkers.set(r + ',' + c, xMesh);
    });
  });
}

const KOMI = 7.5; // standard compensation for White under area/Chinese scoring rules

function endGame(reason) {
  gameOver = true;
  const score = computeScore();
  const whiteWithKomi = score.whiteTotal + KOMI;
  const winner = score.blackTotal > whiteWithKomi ? 'Black' : whiteWithKomi > score.blackTotal ? 'White' : 'Nobody';
  const margin = Math.abs(score.blackTotal - whiteWithKomi);

  const breakdown = `Black ${score.blackTotal} (${score.blackStones} stones + ${score.blackTerritory} territory) vs White ${score.whiteTotal} (${score.whiteStones} stones + ${score.whiteTerritory} territory) + ${KOMI} komi = ${whiteWithKomi}`;

  const summary = winner === 'Nobody'
    ? `Game over (${reason}). It's a tie! ${breakdown}.`
    : `Game over (${reason}). ${winner} wins by ${margin}! ${breakdown}.`;

  statusEl.textContent = summary;
  log(summary);
  updateConfirmButtonVisibility();
}

const menuToggle = document.getElementById('menu-toggle');
const menuPanel = document.getElementById('menu-panel');
menuToggle.addEventListener('click', () => {
  menuPanel.style.display = menuPanel.style.display === 'flex' ? 'none' : 'flex';
});
menuPanel.addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') menuPanel.style.display = 'none'; // auto-close after button actions; sliders don't trigger this
});

document.getElementById('pass-btn').addEventListener('click', doPass);
document.getElementById('resign-btn').addEventListener('click', doResign);

const placedStones = []; // {row, col, stoneMesh, ringMesh, color}

function removeStoneAt(row, col) {
  const idx = placedStones.findIndex((s) => s.row === row && s.col === col);
  if (idx !== -1) {
    scene.remove(placedStones[idx].stoneMesh);
    scene.remove(placedStones[idx].ringMesh);
    placedStones.splice(idx, 1);
  }
}

function placeStoneAt(row, col) {
  if (gameOver) {
    log('Game is over — Recalibrate to start a new game');
    return;
  }

  if (boardState[row][col] !== EMPTY) {
    log(`Illegal move: row=${row}, col=${col} is already occupied`);
    return;
  }

  if (koPoint && koPoint.row === row && koPoint.col === col) {
    log(`Illegal move: row=${row}, col=${col} violates the Ko rule (would immediately recreate the previous position) — play elsewhere first`);
    return;
  }

  const preMoveSnapshot = snapshotState(); // captured BEFORE any mutation, for Undo

  const placingColor = currentTurn;
  const opponentColor = placingColor === BLACK ? WHITE : BLACK;

  // Tentatively place, then check for captures of adjacent opponent groups
  boardState[row][col] = placingColor;

  const capturedSet = new Set();
  const neighborList = neighborsOf(row, col);
  log(`DEBUG placing at (${row},${col}): checking ${neighborList.length} neighbors: ${JSON.stringify(neighborList)}`);
  neighborList.forEach(([nr, nc]) => {
    const cellColor = boardState[nr][nc];
    log(`  neighbor (${nr},${nc}) color=${cellColor} (opponent=${opponentColor})`);
    if (cellColor === opponentColor) {
      const group = getGroup(nr, nc);
      const libs = groupLiberties(group);
      log(`  -> opponent group at (${nr},${nc}): size=${group.length}, liberties=${libs}`);
      if (libs === 0) {
        group.forEach(([r, c]) => capturedSet.add(r + ',' + c));
      }
    }
  });

  // Remove captured stones from board state before checking our own liberties
  capturedSet.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    boardState[r][c] = EMPTY;
  });

  const ownGroup = getGroup(row, col);
  const ownLiberties = groupLiberties(ownGroup);

  if (ownLiberties === 0 && capturedSet.size === 0) {
    // Illegal suicide move — undo everything
    boardState[row][col] = EMPTY;
    log(`Illegal move: row=${row}, col=${col} would have no liberties (suicide)`);
    return;
  }

  // Move confirmed legal from here — save the pre-move snapshot for Undo
  moveHistory.push(preMoveSnapshot);

  // Ko rule: if this move was a single stone capturing exactly one opponent
  // stone, the opponent can't immediately recapture at that same point next turn.
  if (capturedSet.size === 1 && ownGroup.length === 1) {
    const [kr, kc] = [...capturedSet][0].split(',').map(Number);
    koPoint = { row: kr, col: kc };
    log(`Ko point set at (${kr},${kc}) — opponent can't immediately recapture there`);
  } else {
    koPoint = null;
  }

  // Legal move — render it
  stoneCount++;
  const pos = new THREE.Vector3();
  gridPosition(row, col, pos);

  const mat = placingColor === BLACK ? stoneAssets.blackMat : stoneAssets.whiteMat;
  const stoneMesh = new THREE.Mesh(stoneAssets.stoneGeo, mat);
  stoneMesh.position.copy(pos);
  stoneMesh.position.y += 0.003;
  scene.add(stoneMesh);

  const ringMesh = new THREE.Mesh(stoneAssets.ringGeo, stoneAssets.ringMat);
  ringMesh.position.copy(pos);
  ringMesh.position.y += 0.001;
  scene.add(ringMesh);

  placedStones.push({ row, col, stoneMesh, ringMesh, color: placingColor });

  // Remove captured stones visually
  capturedSet.forEach((key) => {
    const [r, c] = key.split(',').map(Number);
    removeStoneAt(r, c);
  });

  if (capturedSet.size > 0) {
    if (placingColor === BLACK) blackCaptures += capturedSet.size;
    else whiteCaptures += capturedSet.size;
    updateCapturesUI();
  }

  const colorName = placingColor === BLACK ? 'Black' : 'White';
  const captureNote = capturedSet.size > 0 ? ` — captured ${capturedSet.size} stone(s)!` : '';
  log(`${colorName} stone #${stoneCount} placed at row=${row}, col=${col}${captureNote}`);

  passCount = 0;
  currentTurn = opponentColor;
  updateTurnStatus();
  saveGameState();
  if (gridBuilt) reapplyGridHeight(); // updates line gaps around the new stone immediately
  if (pendingRestoreData) {
    pendingRestoreData = null;
    document.getElementById('restore-btn').style.display = 'none';
  }
}

// --- Tap-to-place: screen-space nearest dot (only active once calibrated) ---
let lastTapTime = 0;
function handleDeadStoneTap(tapX, tapY) {
  const projected2D = [];
  placedStones.forEach((s) => {
    const p = s.stoneMesh.position.clone().project(camera);
    if (p.z > 1) return;
    const screenX = (p.x * 0.5 + 0.5) * window.innerWidth;
    const screenY = (-p.y * 0.5 + 0.5) * window.innerHeight;
    projected2D.push({ stone: s, x: screenX, y: screenY });
  });

  if (projected2D.length === 0) {
    log('No stones on the board to mark');
    return;
  }

  let sampleDist = null;
  const p0 = projected2D[0];
  for (let i = 1; i < projected2D.length; i++) {
    const d = Math.hypot(projected2D[i].x - p0.x, projected2D[i].y - p0.y);
    if (d > 2 && (sampleDist === null || d < sampleDist)) sampleDist = d;
  }
  const radius = Math.min(90, Math.max(18, (sampleDist || 40) * 0.65));

  let closest = null, closestDist = Infinity;
  projected2D.forEach(({ stone, x, y }) => {
    const dist = Math.hypot(x - tapX, y - tapY);
    if (dist < closestDist) { closestDist = dist; closest = stone; }
  });

  if (closest && closestDist < radius) {
    toggleDeadStone(closest.row, closest.col);
  } else {
    log(`Dead-mark tap missed — nearest stone was ${closestDist.toFixed(0)}px away`);
  }
}

function toggleDeadStone(row, col) {
  const stone = placedStones.find((s) => s.row === row && s.col === col);
  if (!stone) return;

  const group = getGroup(row, col); // all connected same-color stones, same logic used for captures
  const key = row + ',' + col;
  const alreadyDead = deadMarkers.has(key);

  if (alreadyDead) {
    group.forEach(([r, c]) => {
      const k = r + ',' + c;
      if (deadMarkers.has(k)) {
        scene.remove(deadMarkers.get(k));
        deadMarkers.delete(k);
      }
    });
    log(`Unmarked dead group of ${group.length} stone(s), starting at (${row},${col})`);
  } else {
    // Black stones get a white X, White stones get a black X — opposite color for visibility
    const xColor = stone.color === BLACK ? 0xffffff : 0x000000;
    group.forEach(([r, c]) => {
      const k = r + ',' + c;
      if (deadMarkers.has(k)) return;
      const s = placedStones.find((ps) => ps.row === r && ps.col === c);
      if (!s) return;
      const xMesh = createXMarker(xColor);
      xMesh.position.copy(s.stoneMesh.position);
      xMesh.position.y += 0.005;
      scene.add(xMesh);
      deadMarkers.set(k, xMesh);
    });
    log(`Marked dead group of ${group.length} stone(s), starting at (${row},${col})`);
  }
  updateTerritoryPreview();
}

function finalizeScoreWithDeadStones() {
  deadMarkers.forEach((xMesh, key) => {
    const [r, c] = key.split(',').map(Number);
    const deadColor = boardState[r][c];
    if (deadColor === EMPTY) return;

    if (deadColor === BLACK) whiteCaptures++; else blackCaptures++;
    boardState[r][c] = EMPTY; // counts as captured/empty for scoring, but stays visible on screen
  });
  updateCapturesUI();
  updateTerritoryPreview(); // recompute with the final (post-removal) board state

  markingDeadStones = false;
  document.getElementById('finalize-btn').style.display = 'none';
  endGame('two passes, dead stones removed');
  saveGameState();
}

document.getElementById('finalize-btn').addEventListener('click', finalizeScoreWithDeadStones);

function onTouchTap(event) {
  if (!gridBuilt) return; // calibration taps are handled via WebXR 'select' instead
  if (event.target.closest && (event.target.closest('#menu-panel') || event.target.closest('#menu-toggle') || event.target.closest('.adjust-btn') || event.target.closest('#log') || event.target.closest('#confirm-move-btn'))) return;

  const now = Date.now();
  if (now - lastTapTime < 400) return;
  lastTapTime = now;
  if (event.type === 'touchend') event.preventDefault();

  const touch = event.changedTouches ? event.changedTouches[0] : event;
  const tapX = touch.clientX, tapY = touch.clientY;

  if (markingDeadStones) {
    handleDeadStoneTap(tapX, tapY);
    return;
  }

  const projected2D = [];
  dotMeshes.forEach((mesh) => {
    const p = mesh.position.clone().project(camera);
    if (p.z > 1) return;
    const screenX = (p.x * 0.5 + 0.5) * window.innerWidth;
    const screenY = (-p.y * 0.5 + 0.5) * window.innerHeight;
    projected2D.push({ mesh, x: screenX, y: screenY });
  });

  if (projected2D.length < 2) return;

  let sampleDist = null;
  const p0 = projected2D[0];
  for (let i = 1; i < projected2D.length; i++) {
    const d = Math.hypot(projected2D[i].x - p0.x, projected2D[i].y - p0.y);
    if (d > 2 && (sampleDist === null || d < sampleDist)) sampleDist = d;
  }
  const adaptiveRadius = Math.min(90, Math.max(18, (sampleDist || 40) * 0.65));

  let closest = null, closestDist = Infinity;
  projected2D.forEach(({ mesh, x, y }) => {
    const dist = Math.hypot(x - tapX, y - tapY);
    if (dist < closestDist) { closestDist = dist; closest = mesh; }
  });

  if (closest && closestDist < adaptiveRadius) {
    placeStoneAt(closest.userData.row, closest.userData.col);
  } else {
    log(`Tap missed — nearest dot was ${closestDist.toFixed(0)}px away (radius: ${adaptiveRadius.toFixed(0)}px)`);
  }
}

window.addEventListener('touchend', onTouchTap, { passive: false });
window.addEventListener('click', onTouchTap);

// --- Render loop with hit-test for calibration reticle ---
// --- Auto-detect physical stone placement via raw camera pixel access ---
// EXPERIMENTAL: this uses a very new, sparsely-documented WebXR feature.
// Falls back gracefully to manual tap-to-place if unsupported or unreliable.
let cameraGlBinding = null;
let cameraBindingChecked = false;
let sampleFramebuffer = null;
let pendingConfirmCapture = false;
const BRIGHTNESS_CHANGE_THRESHOLD = 25; // minimum change to count as "something appeared here"

function ensureCameraBinding(session) {
  if (cameraBindingChecked) return;
  cameraBindingChecked = true;
  try {
    const gl = renderer.getContext();
    if (typeof XRWebGLBinding === 'undefined') {
      log('Camera auto-detect: XRWebGLBinding not available in this browser');
      return;
    }
    cameraGlBinding = new XRWebGLBinding(session, gl);
    log('Camera auto-detect: binding created successfully');
  } catch (err) {
    log('Camera auto-detect: setup failed (' + err.message + ') — use manual tap-to-place instead');
  }
}

// The camera texture's orientation relative to our 3D coordinates is uncertain
// (very likely rotated, based on two tests showing errors on different axes) —
// these are all 8 possible axis-aligned corrections. Use "Camera Coord Mode" in
// the menu to cycle through them and find the one that detects correctly.
const COORD_MODES = [
  { name: 'normal',      fn: (x, y) => [ x * 0.5 + 0.5, -y * 0.5 + 0.5] },
  { name: 'flipX',       fn: (x, y) => [-x * 0.5 + 0.5, -y * 0.5 + 0.5] },
  { name: 'flipY',       fn: (x, y) => [ x * 0.5 + 0.5,  y * 0.5 + 0.5] },
  { name: 'flipXY',      fn: (x, y) => [-x * 0.5 + 0.5,  y * 0.5 + 0.5] },
  { name: 'rot90',       fn: (x, y) => [ y * 0.5 + 0.5,  x * 0.5 + 0.5] },
  { name: 'rot90flipX',  fn: (x, y) => [-y * 0.5 + 0.5,  x * 0.5 + 0.5] },
  { name: 'rot90flipY',  fn: (x, y) => [ y * 0.5 + 0.5, -x * 0.5 + 0.5] },
  { name: 'rot90flipXY', fn: (x, y) => [-y * 0.5 + 0.5, -x * 0.5 + 0.5] }
];
let cameraCoordModeIndex = 0;

let loggedTextureDims = false;

function sampleIntersectionBrightness(gl, texture, texWidth, texHeight, worldPos) {
  if (!loggedTextureDims) {
    loggedTextureDims = true;
    log(`Camera auto-detect: texture is ${texWidth}x${texHeight}, canvas is ${window.innerWidth}x${window.innerHeight}`);
  }
  const ndc = worldPos.clone().project(camera);
  if (ndc.z > 1) return null; // behind camera
  const [normX, normY] = COORD_MODES[cameraCoordModeIndex].fn(ndc.x, ndc.y);
  const centerX = Math.round(normX * texWidth);
  const centerY = Math.round(normY * texHeight);

  const BLOCK = 5; // sample a 5x5 block instead of a single pixel, to average out noise
  const half = Math.floor(BLOCK / 2);
  const x0 = centerX - half, y0 = centerY - half;
  if (x0 < 0 || y0 < 0 || x0 + BLOCK > texWidth || y0 + BLOCK > texHeight) return null;

  if (!sampleFramebuffer) sampleFramebuffer = gl.createFramebuffer();
  const prevFB = gl.getParameter(gl.FRAMEBUFFER_BINDING);
  gl.bindFramebuffer(gl.FRAMEBUFFER, sampleFramebuffer);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  const pixels = new Uint8Array(BLOCK * BLOCK * 4);
  gl.readPixels(x0, y0, BLOCK, BLOCK, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
  gl.bindFramebuffer(gl.FRAMEBUFFER, prevFB); // restore, so Three.js's own render call right after isn't broken

  let sum = 0;
  for (let i = 0; i < BLOCK * BLOCK; i++) {
    sum += (pixels[i * 4] + pixels[i * 4 + 1] + pixels[i * 4 + 2]) / 3;
  }
  return sum / (BLOCK * BLOCK);
}

// Single-frame detection: instead of comparing two snapshots taken at different
// times (vulnerable to lighting/shadow changes from moving the phone in between),
// this finds points whose brightness is a clear outlier relative to the median
// of all other points in the SAME snapshot. A stone is always much darker or
// lighter than bare wood, regardless of current lighting conditions.
function detectStoneSingleFrame(frame, referenceSpace) {
  const snap = captureEmptyIntersectionSnapshot(frame, referenceSpace);
  if (!snap) return null;
  const entries = Object.entries(snap);
  if (entries.length < 5) return null;

  const values = entries.map(([, v]) => v).sort((a, b) => a - b);
  const median = values[Math.floor(values.length / 2)];

  let bestKey = null, bestDeviation = 0;
  entries.forEach(([key, v]) => {
    const dev = Math.abs(v - median);
    if (dev > bestDeviation) { bestDeviation = dev; bestKey = key; }
  });

  return { snap, median, bestKey, bestDeviation };
}

function captureEmptyIntersectionSnapshot(frame, referenceSpace) {
  if (!cameraGlBinding) return null;
  const pose = frame.getViewerPose(referenceSpace);
  if (!pose || pose.views.length === 0) return null;
  const view = pose.views[0];
  if (!view.camera) {
    log('Camera auto-detect: this view has no camera data available');
    return null;
  }
  let texture, texWidth, texHeight;
  try {
    texture = cameraGlBinding.getCameraImage(view.camera);
    texWidth = view.camera.width;
    texHeight = view.camera.height;
  } catch (err) {
    log('Camera auto-detect: could not get camera image (' + err.message + ')');
    return null;
  }
  if (!texture || !texWidth || !texHeight) return null;

  const gl = renderer.getContext();
  const snapshot = {};
  const pos = new THREE.Vector3();
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (boardState[r][c] !== EMPTY) continue; // only track currently-empty points
      gridPosition(r, c, pos);
      const brightness = sampleIntersectionBrightness(gl, texture, texWidth, texHeight, pos);
      if (brightness !== null) snapshot[r + ',' + c] = brightness;
    }
  }
  return snapshot;
}

document.getElementById('confirm-move-btn').addEventListener('click', () => {
  if (!cameraGlBinding) {
    log('Camera auto-detect not available — tap the correct dot on screen manually instead');
    return;
  }
  log('Capturing camera image to detect your placed stone...');
  pendingConfirmCapture = true;
});

let pendingDebugHeatmap = false;

function showDebugHeatmap(frame, referenceSpace) {
  const result = detectStoneSingleFrame(frame, referenceSpace);
  if (!result) { log('Heatmap: capture failed'); return; }

  const { snap, median, bestDeviation } = result;
  log(`Heatmap shown — median brightness ${median.toFixed(0)}, biggest deviation ${bestDeviation.toFixed(0)} (red = most different from typical board color right now)`);

  let maxDev = 0;
  Object.values(snap).forEach((v) => { const d = Math.abs(v - median); if (d > maxDev) maxDev = d; });

  dotMeshes.forEach((mesh) => {
    const key = mesh.userData.row + ',' + mesh.userData.col;
    const v = snap[key];
    const d = v === undefined ? 0 : Math.abs(v - median);
    const t = maxDev > 0 ? d / maxDev : 0;
    mesh.material.opacity = Math.max(0.18, t);
    mesh.material.color.setRGB(t, 1 - t, 0); // green (typical) -> red (most different from median)
  });
}

function clearDebugHeatmap() {
  dotMeshes.forEach((mesh) => {
    mesh.material.opacity = 0;
    mesh.material.color.setHex(0xffcc00);
  });
  log('Heatmap cleared');
}

document.getElementById('show-heatmap-btn').addEventListener('click', () => {
  if (!cameraGlBinding) { log('Camera auto-detect not available'); return; }
  pendingDebugHeatmap = true;
});
document.getElementById('clear-heatmap-btn').addEventListener('click', clearDebugHeatmap);

function updateConfirmButtonVisibility() {
  const btn = document.getElementById('confirm-move-btn');
  btn.style.display = (gridBuilt && !gameOver && !markingDeadStones) ? 'block' : 'none';
}

let renderErrorLogged = false;
function render(timestamp, frame) {
  try {
    if (frame) {
      const referenceSpace = renderer.xr.getReferenceSpace();
      const session = renderer.xr.getSession();

      if (!hitTestSourceRequested) {
        session.requestReferenceSpace('viewer').then((viewerSpace) => {
          session.requestHitTestSource({ space: viewerSpace }).then((source) => {
            hitTestSource = source;
          });
        });
        session.addEventListener('end', () => {
          hitTestSourceRequested = false;
          hitTestSource = null;
          log('XR session ended (either you exited, or the session crashed/was terminated by the OS)');
        });
        hitTestSourceRequested = true;
      }

      if (hitTestSource && !calibrated && !adjusting) {
        const hitTestResults = frame.getHitTestResults(hitTestSource);
        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          latestHitTestResult = hit;
          reticle.visible = true;
          reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
        } else {
          latestHitTestResult = null;
          reticle.visible = false;
        }
      }

      // Continuously refine each corner's position from its anchor, if it has one —
      // this protects against tracking drift/jumps during actual gameplay. But it's
      // paused for the entire calibration/adjustment process (tapping AND fine-tuning),
      // since the anchor's own ongoing refinement would otherwise fight with manual
      // input, making everything feel jumpy while you're setting things up.
      let anyCornerUpdated = false;
      for (let i = 0; i < 4; i++) {
        if (cornerAnchors[i] && calibrated && !adjusting) {
          const pose = frame.getPose(cornerAnchors[i].anchorSpace, referenceSpace);
          if (pose) {
            if (!cornerBasePosition[i]) cornerBasePosition[i] = new THREE.Vector3();
            cornerBasePosition[i].set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
            anyCornerUpdated = true;
          }
        }
        if (cornerBasePosition[i]) {
          if (!corners[i]) corners[i] = new THREE.Vector3();
          corners[i].copy(cornerBasePosition[i]).add(cornerOffsets[i]);
          if (cornerMarkers[i]) cornerMarkers[i].position.copy(corners[i]);
        }
      }
      if (gridBuilt && anyCornerUpdated) reapplyGridHeight();

      // Camera auto-detect: binding setup and any pending capture, done here
      // since XRFrame is only valid inside this callback
      if (gridBuilt) {
        ensureCameraBinding(session);

        if (pendingDebugHeatmap) {
          pendingDebugHeatmap = false;
          showDebugHeatmap(frame, referenceSpace);
        }

        if (pendingConfirmCapture) {
          pendingConfirmCapture = false;
          const result = detectStoneSingleFrame(frame, referenceSpace);
          if (!result) {
            log('Camera auto-detect: capture failed — tap the correct dot manually instead');
          } else {
            const { bestKey, bestDeviation, median } = result;
            if (bestKey && bestDeviation >= BRIGHTNESS_CHANGE_THRESHOLD) {
              const [r, c] = bestKey.split(',').map(Number);
              const debugPos = new THREE.Vector3();
              gridPosition(r, c, debugPos);
              const debugNdc = debugPos.clone().project(camera);
              log(`Camera auto-detect: found a change at (${r},${c}), deviation ${bestDeviation.toFixed(0)} from median ${median.toFixed(0)}, ndc=(${debugNdc.x.toFixed(3)},${debugNdc.y.toFixed(3)})`);
              placeStoneAt(r, c);
            } else {
              log(`Camera auto-detect: no clear change found (best deviation ${bestDeviation.toFixed(0)}, needed ${BRIGHTNESS_CHANGE_THRESHOLD}) — tap the correct dot manually instead`);
            }
          }
        }
      }
    }

    renderer.render(scene, camera);
  } catch (err) {
    if (!renderErrorLogged) {
      renderErrorLogged = true; // avoid flooding the log every frame
      log('RENDER ERROR: ' + err.message);
      console.error(err);
    }
  }
}
</script>
